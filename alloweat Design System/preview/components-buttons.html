<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
@font-face { font-family: 'Figtree'; src: url('../fonts/Figtree-Regular.ttf') format('truetype'); font-weight: 400; }
@font-face { font-family: 'Figtree'; src: url('../fonts/Figtree-SemiBold.ttf') format('truetype'); font-weight: 600; }
@font-face { font-family: 'Figtree'; src: url('../fonts/Figtree-Bold.ttf') format('truetype'); font-weight: 700; }
</style>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Figtree', sans-serif; background: #F7F7FB; padding: 20px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
  .label { font-size: 11px; font-weight: 600; color: rgba(5,5,5,0.4); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 0 16px; height: 36px; border-radius: 8px; font-family: 'Figtree', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 150ms ease; }
  .btn-primary { background: #7448D0; color: #fff; }
  .btn-primary:hover { background: #59379E; }
  .btn-secondary { background: #F5F1FE; color: #7448D0; }
  .btn-secondary:hover { background: #EBE3FD; }
  .btn-outline { background: transparent; color: #050505; border: 1px solid rgba(20,20,20,0.15); }
  .btn-outline:hover { background: rgba(20,20,20,0.04); }
  .btn-ghost { background: transparent; color: rgba(5,5,5,0.65); }
  .btn-ghost:hover { background: rgba(20,20,20,0.06); color: #050505; }
  .btn-danger { background: #FEF2F2; color: #DC2626; }
  .btn-danger:hover { background: #FEE2E2; }
  .btn-sm { height: 28px; padding: 0 10px; font-size: 12px; border-radius: 6px; }
  .btn-lg { height: 44px; padding: 0 22px; font-size: 15px; border-radius: 10px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .divider { height: 1px; background: rgba(20,20,20,0.07); margin: 10px 0; }
  /* Icon buttons */
  .icon-btn { display: inline-flex; align-items: center; justify-content: center; border: none; cursor: pointer; transition: all 150ms ease; font-family: 'Figtree', sans-serif; }
  .icon-btn-sm  { width: 28px; height: 28px; border-radius: 6px; }
  .icon-btn-md  { width: 36px; height: 36px; border-radius: 8px; }
  .icon-btn-lg  { width: 44px; height: 44px; border-radius: 10px; }
  .icon-btn-circle-md { width: 36px; height: 36px; border-radius: 50%; }
  .icon-btn-primary  { background: #7448D0; color: #fff; }
  .icon-btn-primary:hover { background: #59379E; }
  .icon-btn-secondary { background: #F5F1FE; color: #7448D0; }
  .icon-btn-secondary:hover { background: #EBE3FD; }
  .icon-btn-outline { background: #fff; color: #050505; border: 1px solid rgba(20,20,20,0.14); }
  .icon-btn-outline:hover { background: #F7F7FB; }
  .icon-btn-ghost { background: transparent; color: rgba(5,5,5,0.6); }
  .icon-btn-ghost:hover { background: rgba(20,20,20,0.06); color: #050505; }
  .icon-btn-danger { background: #FEF2F2; color: #DC2626; }
  .icon-btn-danger:hover { background: #FEE2E2; }
  .icon-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
<p class="label">Primary</p>
<div class="row">
  <button class="btn btn-primary btn-sm">Dodaj</button>
  <button class="btn btn-primary">Dodaj posiłek</button>
  <button class="btn btn-primary btn-lg">Rozpocznij</button>
  <button class="btn btn-primary" disabled>Disabled</button>
</div>
<div class="divider"></div>
<p class="label">Secondary & Ghost</p>
<div class="row">
  <button class="btn btn-secondary btn-sm">Filtruj</button>
  <button class="btn btn-secondary">Eksportuj dane</button>
  <button class="btn btn-outline">Anuluj</button>
  <button class="btn btn-ghost">Więcej</button>
  <button class="btn btn-ghost" disabled>Disabled</button>
</div>
<div class="divider"></div>
<p class="label">Danger</p>
<div class="row">
  <button class="btn btn-danger btn-sm">Usuń</button>
  <button class="btn btn-danger">Usuń konto</button>
</div>
<div class="divider"></div>
<p class="label">Icon Buttons</p>
<div class="row" style="align-items:center">
  <!-- Plus -->
  <button class="icon-btn icon-btn-md icon-btn-primary" title="Dodaj">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
  </button>
  <!-- Edit -->
  <button class="icon-btn icon-btn-md icon-btn-secondary" title="Edytuj">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M11 2.5l2.5 2.5L5 13.5H2.5V11L11 2.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
  </button>
  <!-- Filter -->
  <button class="icon-btn icon-btn-md icon-btn-outline" title="Filtruj">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M5 8h6M7 12h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
  </button>
  <!-- More -->
  <button class="icon-btn icon-btn-md icon-btn-ghost" title="Więcej">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="4" r="1.2" fill="currentColor"/><circle cx="8" cy="8" r="1.2" fill="currentColor"/><circle cx="8" cy="12" r="1.2" fill="currentColor"/></svg>
  </button>
  <!-- Delete -->
  <button class="icon-btn icon-btn-md icon-btn-danger" title="Usuń">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 5h10M6 5V3h4v2M6 8v5M10 8v5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
  </button>
  <div style="width:1px;height:28px;background:rgba(20,20,20,0.1);margin:0 4px"></div>
  <!-- Sizes -->
  <button class="icon-btn icon-btn-sm icon-btn-outline" title="Małe">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
  </button>
  <button class="icon-btn icon-btn-md icon-btn-outline" title="Średnie">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
  </button>
  <button class="icon-btn icon-btn-lg icon-btn-outline" title="Duże">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2v16M2 10h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
  </button>
  <div style="width:1px;height:28px;background:rgba(20,20,20,0.1);margin:0 4px"></div>
  <!-- Circle variant -->
  <button class="icon-btn icon-btn-circle-md icon-btn-primary" title="Okrągły">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
  </button>
  <button class="icon-btn icon-btn-circle-md icon-btn-outline" title="Okrągły outline">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M5 8h6M8 5v6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
  </button>
  <!-- Disabled -->
  <button class="icon-btn icon-btn-md icon-btn-primary" disabled title="Wyłączony">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
  </button>
</div>
</body>
</html>
