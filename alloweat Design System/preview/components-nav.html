<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
@font-face { font-family: 'Figtree'; src: url('../fonts/Figtree-Regular.ttf') format('truetype'); font-weight: 400; }
@font-face { font-family: 'Figtree'; src: url('../fonts/Figtree-Medium.ttf') format('truetype'); font-weight: 500; }
@font-face { font-family: 'Figtree'; src: url('../fonts/Figtree-SemiBold.ttf') format('truetype'); font-weight: 600; }
@font-face { font-family: 'Figtree'; src: url('../fonts/Figtree-Bold.ttf') format('truetype'); font-weight: 700; }
</style>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Figtree', sans-serif; background: #F7F7FB; padding: 16px; display: flex; flex-direction: column; gap: 16px; }

  .section-label { font-size: 11px; font-weight: 600; color: #4A4A5A; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .frame { background: #fff; border: 1px solid rgba(20,20,20,0.10); border-radius: 12px; overflow: visible; display: flex; height: 340px; position: relative; }
  .frame-inner { display: flex; width: 100%; overflow: hidden; border-radius: 12px; }

  /* ── Sidebar shared ── */
  .sidebar {
    background: #fff;
    border-right: 1px solid rgba(20,20,20,0.10);
    display: flex; flex-direction: column;
    padding: 12px 8px;
    gap: 2px;
    flex-shrink: 0;
    position: relative;
    transition: width 200ms ease;
  }
  .sidebar.collapsed { width: 52px; align-items: center; }
  .sidebar.expanded  { width: 220px; }

  /* ── Collapse toggle button ── */
  .collapse-btn {
    position: absolute;
    top: 50%;
    right: -12px;
    transform: translateY(-50%);
    width: 24px; height: 24px;
    border-radius: 50%;
    background: #fff;
    border: 1px solid rgba(20,20,20,0.14);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: rgba(5,5,5,0.55);
    z-index: 10;
    opacity: 0;
    transition: opacity 150ms ease, background 150ms ease, color 150ms ease;
    box-shadow: 0 1px 4px rgba(20,20,20,0.10);
  }
  .sidebar:hover .collapse-btn { opacity: 1; }
  .collapse-btn:hover { background: #7448D0; border-color: #7448D0; color: #fff; }

  /* ── Logo area ── */
  .logo-mark { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-full  { display: flex; align-items: center; padding: 4px 8px 10px; overflow: hidden; }
  .sidebar.collapsed .logo-full { display: none; }
  .sidebar.expanded  .logo-mark { display: none; }
  .sidebar.collapsed .logo-mark { margin-bottom: 6px; display: flex; }

  /* ── Divider ── */
  .divider { height: 1px; background: rgba(20,20,20,0.08); margin: 4px 0; flex-shrink: 0; }
  .sidebar.collapsed .divider { width: 36px; }
  .sidebar.expanded  .divider { width: 100%; }

  /* ── Collapsed icon-only nav ── */
  .nav-icon {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 150ms; color: rgba(5,5,5,0.45);
    flex-shrink: 0;
  }
  .nav-icon:hover { background: rgba(116,72,208,0.07); color: rgba(5,5,5,0.75); }
  .nav-icon.active { background: #F5F1FE; color: #7448D0; }
  .sidebar.expanded .nav-icon { display: none; }

  /* ── Expanded label nav ── */
  .nav-row {
    display: flex; align-items: center; gap: 10px;
    padding: 0 8px; height: 36px; border-radius: 8px;
    cursor: pointer; transition: background 150ms; color: rgba(5,5,5,0.55);
    flex-shrink: 0; white-space: nowrap; overflow: hidden;
  }
  .nav-row:hover { background: rgba(116,72,208,0.06); color: rgba(5,5,5,0.85); }
  .nav-row.active { background: #F5F1FE; color: #7448D0; }
  .nav-row .icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .nav-row .nav-label { font-size: 13px; font-weight: 500; }
  .nav-row.active .nav-label { font-weight: 600; }
  .sidebar.collapsed .nav-row { display: none; }

  .spacer { flex: 1; }

  /* ── Topbar ── */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .topbar { height: 56px; background: #fff; border-bottom: 1px solid rgba(20,20,20,0.10); display: flex; align-items: center; padding: 0 20px; gap: 10px; flex-shrink: 0; }
  .topbar-title { font-size: 15px; font-weight: 600; color: #050505; flex: 1; }
  .search { display: flex; align-items: center; gap: 7px; background: #fff; border: 1px solid rgba(20,20,20,0.12); border-radius: 8px; padding: 0 11px; height: 32px; width: 180px; }
  .search input { border: none; outline: none; font-family: 'Figtree', sans-serif; font-size: 13px; color: #050505; background: transparent; width: 100%; }
  .search input::placeholder { color: rgba(5,5,5,0.35); }
  .topbar-btn { width: 32px; height: 32px; border-radius: 50%; background: #fff; border: 1px solid rgba(20,20,20,0.10); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: #7448D0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .content { flex: 1; background: #F7F7FB; padding: 20px; }
  .page-title { font-size: 18px; font-weight: 700; color: #050505; }
  .page-sub { font-size: 12px; color: #4A4A5A; margin-top: 3px; }

  /* Chevron icons flip based on state */
  .chevron-collapse { display: block; }
  .chevron-expand   { display: none; }
  .sidebar.collapsed .chevron-collapse { display: none; }
  .sidebar.collapsed .chevron-expand   { display: block; }
</style>
</head>

<script>
  const sidebar = document.getElementById('sidebar');
  const btn = document.getElementById('collapseBtn');

  btn.addEventListener('click', () => {
    const isExpanded = sidebar.classList.contains('expanded');
    sidebar.classList.toggle('expanded', !isExpanded);
    sidebar.classList.toggle('collapsed', isExpanded);
  });
</script>
