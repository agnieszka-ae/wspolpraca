<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
@font-face { font-family: 'Figtree'; src: url('../fonts/Figtree-Regular.ttf') format('truetype'); font-weight: 400; font-style: normal; }
@font-face { font-family: 'Figtree'; src: url('../fonts/Figtree-Medium.ttf') format('truetype'); font-weight: 500; font-style: normal; }
@font-face { font-family: 'Figtree'; src: url('../fonts/Figtree-SemiBold.ttf') format('truetype'); font-weight: 600; font-style: normal; }
@font-face { font-family: 'Figtree'; src: url('../fonts/Figtree-Bold.ttf') format('truetype'); font-weight: 700; font-style: normal; }
@font-face { font-family: 'Figtree'; src: url('../fonts/Figtree-ExtraBold.ttf') format('truetype'); font-weight: 800; font-style: normal; }
</style>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Figtree', sans-serif; background: #F7F7FB; padding: 20px 24px; }
  .row { display: flex; align-items: baseline; gap: 14px; padding: 7px 0; border-bottom: 1px solid rgba(20,20,20,0.06); }
  .row:last-child { border-bottom: none; }
  .meta { width: 80px; flex-shrink: 0; font-size: 11px; font-weight: 500; color: rgba(5,5,5,0.35); }
</style>
</head>
<body>
<div class="row">
  <div class="meta">32 / 700</div>
  <div style="font-size:32px;font-weight:700;letter-spacing:-0.015em;line-height:1.25;color:#050505">Display</div>
</div>
<div class="row">
  <div class="meta">24 / 600</div>
  <div style="font-size:24px;font-weight:600;letter-spacing:-0.015em;line-height:1.25;color:#050505">Heading 1</div>
</div>
<div class="row">
  <div class="meta">18 / 600</div>
  <div style="font-size:18px;font-weight:600;line-height:1.375;color:#050505">Heading 2</div>
</div>
<div class="row">
  <div class="meta">15 / 600</div>
  <div style="font-size:15px;font-weight:600;line-height:1.375;color:#050505">Heading 3</div>
</div>
<div class="row">
  <div class="meta">14 / 400</div>
  <div style="font-size:14px;font-weight:400;line-height:1.5;color:#050505">Body — Zarządzaj swoimi posiłkami</div>
</div>
<div class="row">
  <div class="meta">14 / 500</div>
  <div style="font-size:14px;font-weight:500;line-height:1.5;color:#050505">Body Medium — Saldo konta: 450,00 zł</div>
</div>
<div class="row">
  <div class="meta">13 / 400</div>
  <div style="font-size:13px;font-weight:400;line-height:1.5;color:rgba(5,5,5,0.65)">Small — Dane i usługi</div>
</div>
<div class="row">
  <div class="meta">12 / 400</div>
  <div style="font-size:12px;font-weight:400;line-height:1.5;color:rgba(5,5,5,0.40)">Micro — 27 kwi 2026, 14:32</div>
</div>
<div class="row">
  <div class="meta">12 / 600</div>
  <div style="font-size:12px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:rgba(5,5,5,0.45)">LABEL / UPPERCASE</div>
</div>
</body>
</html>
