<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
@font-face { font-family: 'Figtree'; src: url('../fonts/Figtree-Regular.ttf') format('truetype'); font-weight: 400; }
@font-face { font-family: 'Figtree'; src: url('../fonts/Figtree-SemiBold.ttf') format('truetype'); font-weight: 600; }
@font-face { font-family: 'Figtree'; src: url('../fonts/Figtree-Bold.ttf') format('truetype'); font-weight: 700; }
</style>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Figtree', sans-serif; background: #F7F7FB; padding: 20px; }
  .row { display: flex; gap: 6px; margin-bottom: 10px; }
  /* Swatch: taller so the step label + hex both fit */
  .swatch { flex: 1; height: 56px; border-radius: 8px; display: flex; flex-direction: column; justify-content: flex-end; padding: 5px 7px; border: 1px solid rgba(20,20,20,0.08); gap: 1px; }
  .swatch .step { font-size: 9px; font-weight: 600; }
  .section-label { font-size: 11px; font-weight: 600; color: #4A4A5A; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  /* Semantic tiles */
  .sem { flex: 1; border-radius: 10px; padding: 12px 14px; }
  .sem-name { font-size: 10px; font-weight: 700; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.04em; }
  .sem-hex  { font-size: 13px; font-weight: 700; }
  .sem-desc { font-size: 11px; font-weight: 400; margin-top: 3px; }
</style>
</head>
<body>

<p class="section-label">Neutrals</p>
<div class="row">
  <!-- Light swatches: dark ink label -->
  <div class="swatch" style="background:#fff">
    <span class="step" style="color:#141414">0</span>
  </div>
  <div class="swatch" style="background:#F7F7FB">
    <span class="step" style="color:#141414">50 ★</span>
  </div>
  <div class="swatch" style="background:#EDEDF4">
    <span class="step" style="color:#141414">100</span>
  </div>
  <div class="swatch" style="background:#E0E0EB">
    <span class="step" style="color:#141414">200</span>
  </div>
  <div class="swatch" style="background:#CACAD8">
    <span class="step" style="color:#141414">300</span>
  </div>
  <!-- Dark swatches: white label -->
  <div class="swatch" style="background:#A0A0B8;border-color:transparent">
    <span class="step" style="color:#fff">400</span>
  </div>
  <div class="swatch" style="background:#727272;border-color:transparent">
    <span class="step" style="color:#fff">500</span>
  </div>
  <div class="swatch" style="background:#4A4A5A;border-color:transparent">
    <span class="step" style="color:#fff">600</span>
  </div>
  <div class="swatch" style="background:#2D2D3A;border-color:transparent">
    <span class="step" style="color:#fff">700</span>
  </div>
  <div class="swatch" style="background:#141414;border-color:transparent">
    <span class="step" style="color:#fff">800</span>
  </div>
  <div class="swatch" style="background:#050505;border-color:transparent">
    <span class="step" style="color:#fff">900 ★</span>
  </div>
</div>

<p class="section-label" style="margin-top:4px">Semantic / Feedback</p>
<div class="row">
  <!-- Success: text on #F0FDF4 bg — using #14532D (contrast ~9:1) -->
  <div class="sem" style="background:#F0FDF4;border:1px solid #BBF7D0">
    <div class="sem-name" style="color:#14532D">Success</div>
    <div class="sem-hex"  style="color:#14532D">#16A34A</div>
    <div class="sem-desc" style="color:#166534">Opłacono, aktywny</div>
  </div>
  <!-- Danger: text on #FEF2F2 bg — using #7F1D1D (contrast ~9:1) -->
  <div class="sem" style="background:#FEF2F2;border:1px solid #FECACA">
    <div class="sem-name" style="color:#7F1D1D">Danger</div>
    <div class="sem-hex"  style="color:#7F1D1D">#DC2626</div>
    <div class="sem-desc" style="color:#991B1B">Błąd, zaległość</div>
  </div>
  <!-- Warning: text on #FFFBEB bg — using #713F12 (contrast ~9:1) -->
  <div class="sem" style="background:#FFFBEB;border:1px solid #FDE68A">
    <div class="sem-name" style="color:#713F12">Warning</div>
    <div class="sem-hex"  style="color:#713F12">#D97706</div>
    <div class="sem-desc" style="color:#92400E">Oczekujący</div>
  </div>
  <!-- Info: text on #EFF6FF bg — using #1E3A8A (contrast ~9:1) -->
  <div class="sem" style="background:#EFF6FF;border:1px solid #BFDBFE">
    <div class="sem-name" style="color:#1E3A8A">Info</div>
    <div class="sem-hex"  style="color:#1E3A8A">#2563EB</div>
    <div class="sem-desc" style="color:#1E40AF">Informacja</div>
  </div>
</div>

</body>
</html>
