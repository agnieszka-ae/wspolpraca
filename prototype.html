            <div className="text-[11px] font-semibold text-ink-700 dark:text-dark-textMuted uppercase tracking-wider mb-2">
              Skąd brać przepisy?
            </div>
            <div className="grid grid-cols-3 gap-2">
              {AUTOGEN_SOURCES.map(s => {
                const isActive = source === s.id;
                return (
                  <button
                    key={s.id}
                    onClick={() => setSource(s.id)}
                    className={`text-left p-2.5 rounded-md border transition-all ${
                      isActive
                        ? 'border-brand bg-brand-400/30 dark:bg-brand/10'
                        : 'border-ink-200 dark:border-dark-border bg-white dark:bg-dark-elevated hover:border-brand-300 dark:hover:border-brand/40'
                    }`}
                  >
                    <Icon name={s.icon} className={`w-3.5 h-3.5 mb-1 ${isActive ? 'text-brand' : 'text-ink-700 dark:text-dark-textMuted'}`} stroke={2} />
                    <div className={`text-[11px] font-semibold mb-0.5 ${isActive ? 'text-brand' : 'text-ink-900 dark:text-dark-text'}`}>{s.label}</div>
                    <div className="text-[9px] text-ink-700 dark:text-dark-textMuted">{s.desc}</div>
                  </button>
                );
              })}
            </div>
          </div>

          {/* Lubi na poszczególne posiłki (scope=all) — rozwijalna per-meal */}
          {scope === 'all' && dayType?.meals && (
            <div className="rounded-md border border-brand/20 bg-brand-400/30 dark:bg-brand/5 p-3">
              <div className="flex items-center justify-between mb-2">
                <div className="flex items-center gap-1.5">
                  <Icon name="heart" className="w-3.5 h-3.5 text-brand" stroke={2} />
                  <span className="text-[11px] font-semibold text-ink-700 dark:text-dark-textMuted uppercase tracking-wider">
                    Lubi na poszczególne posiłki
                  </span>
                </div>
                <span className="text-[10px] text-ink-600 dark:text-dark-textMuted">Z profilu klienta</span>
              </div>
              <div className="space-y-1.5">
                {dayType.meals.map(m => {
                  const active = favoriteDishTypes[m.type] || new Set();
                  const isExpanded = expandedEditMeal === m.type;
                  return (
                    <div key={m.id} className={`rounded-md transition-all ${isExpanded ? 'bg-white dark:bg-dark-elevated border border-brand/30' : 'bg-white/60 dark:bg-dark-elevated/40'}`}>
                      <div className="flex items-center gap-2 px-2.5 py-2">
                        <span className="text-[11px] font-semibold text-ink-900 dark:text-dark-text shrink-0 min-w-[100px]">
                          {m.type}
                        </span>
                        <div className="flex-1 min-w-0">
                          {active.size > 0 ? (
                            <div className="flex flex-wrap gap-1">
                              {Array.from(active).slice(0, isExpanded ? active.size : 4).map(t => (
                                <span key={t} className="inline-flex items-center px-1.5 h-5 rounded-full bg-brand-400 dark:bg-brand/20 border border-brand/40 text-brand text-[10px] font-medium">{t}</span>
                              ))}
                              {!isExpanded && active.size > 4 && (
                                <span className="text-[10px] text-ink-600 dark:text-dark-textMuted self-center">+{active.size - 4}</span>
                              )}
                            </div>
                          ) : (
                            <span className="text-[11px] italic text-ink-600 dark:text-dark-textDim">brak — algorytm dobierze różne typy</span>
                          )}
                        </div>
                        <button
                          onClick={() => setExpandedEditMeal(isExpanded ? null : m.type)}
                          className="text-[11px] font-medium text-brand hover:text-brand-dark transition-colors shrink-0 flex items-center gap-0.5"
                        >
                          {isExpanded ? 'Zwiń' : (active.size > 0 ? 'Edytuj' : '+ Dodaj')}
                          <Icon name={isExpanded ? 'chevU' : 'chevD'} className="w-3 h-3" />
                        </button>
                      </div>
                      {/* In-place editor */}
                      {isExpanded && (
                        <div className="px-2.5 pb-2.5 pt-0 border-t border-brand/10 fade-in">
                          <div className="text-[10px] text-ink-600 dark:text-dark-textMuted mb-1.5 mt-2">
                            Wybierz typy które klient lubi na <strong>{m.type.toLowerCase()}</strong> ({MEAL_TYPES_TAXONOMY.length} typów):
                          </div>
                          <div className="flex flex-wrap gap-1">
                            {MEAL_TYPES_TAXONOMY.map(type => {
                              const isOn = active.has(type);
                              return (
                                <button
                                  key={type}
                                  onClick={() => toggleDishType(m.type, type)}
                                  className={`chip-press inline-flex items-center gap-0.5 px-2 h-6 rounded-full border text-[10px] font-medium transition-all ${
                                    isOn
                                      ? 'bg-brand-400 dark:bg-brand/20 border-brand text-brand'
                                      : 'border-ink-200 dark:border-dark-border text-ink-700 dark:text-dark-textMuted hover:border-brand hover:text-brand'
                                  }`}
                                >
                                  {isOn && <Icon name="check" className="w-2.5 h-2.5" stroke={2.5} />}
                                  {type}
                                </button>
                              );
                            })}
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
              <div className="mt-2 pt-2 border-t border-brand/15 flex items-start gap-1.5">
                <Icon name="info" className="w-3 h-3 text-info mt-0.5 shrink-0" />
                <div className="text-[10px] text-ink-700 dark:text-dark-textMuted">
                  Algorytm dobierze więcej przepisów z zaznaczonych typów. Zmiany tutaj są <strong>tylko dla tej generacji</strong> — profil klienta zostaje bez zmian.
                </div>
              </div>
            </div>
          )}

          {/* WARSTWA 1 — Z profilu klienta */}
          {profilePrefItems.length > 0 && (
            <div className="bg-brand-400/30 dark:bg-brand/5 border border-brand/20 rounded-md p-3">
              <div className="flex items-center justify-between mb-2">
                <div className="text-[11px] font-semibold text-ink-700 dark:text-dark-textMuted uppercase tracking-wider flex items-center gap-1.5">
                  <Icon name="users" className="w-3.5 h-3.5 text-brand" stroke={2} />
                  Z profilu klienta
                </div>
                <span className="text-[10px] text-ink-600 dark:text-dark-textMuted">Domyślnie zastosowane</span>
              </div>
              <div className="space-y-1.5">
                {profilePrefItems.map(item => {
                  const isIgnored = ignoredPrefs.has(item.key);
                  const tc = toneClasses[item.tone];
                  return (
                    <div key={item.key} className={`flex items-center gap-2 ${isIgnored ? 'opacity-50' : ''} transition-opacity`}>
                      <span className={`inline-flex items-center gap-1 px-2 h-6 rounded-full ${tc.bg} border ${tc.border} text-[11px] font-medium ${tc.text} ${isIgnored ? 'line-through' : ''}`}>
                        <Icon name={item.icon} className={`w-3 h-3 ${tc.icon}`} stroke={2.5} />
                        {item.label}
                      </span>
                      <button
                        onClick={() => toggleIgnore(item.key)}
                        className={`ml-auto text-[11px] font-medium transition-colors ${
                          isIgnored
                            ? 'text-brand hover:text-brand-dark'
                            : 'text-ink-600 dark:text-dark-textMuted hover:text-ink-900 dark:hover:text-dark-text'
                        }`}
                      >
                        {isIgnored ? 'Przywróć' : 'Ignoruj'}
                      </button>
                    </div>
                  );
                })}
              </div>
              {ignoredPrefs.size > 0 && (
                <div className="mt-2 pt-2 border-t border-brand/20 flex items-center gap-1.5 text-[11px] text-ink-700 dark:text-dark-textMuted">
                  <Icon name="info" className="w-3 h-3 text-info shrink-0" />
                  <span>Ignorujesz {ignoredPrefs.size} {ignoredPrefs.size === 1 ? 'preferencję' : 'preferencje'} tylko dla tej generacji — profil klienta zostaje bez zmian.</span>
                </div>
              )}
            </div>
          )}

          {/* WARSTWA 2 — Wartości odżywcze (edytowalne, z założeń jako default) */}
          <div>
            <div className="flex items-center justify-between mb-2">
              <div className="text-[11px] font-semibold text-ink-700 dark:text-dark-textMuted uppercase tracking-wider flex items-center gap-1.5">
                <Icon name="flame" className="w-3.5 h-3.5 text-warning" stroke={2} />
                Wartości odżywcze
              </div>
              {isNutritionModified && (
                <button
                  onClick={restoreDefaults}
                  className="text-[11px] text-brand hover:text-brand-dark font-medium flex items-center gap-1 transition-colors"
                >
                  <Icon name="arrL" className="w-3 h-3" /> Przywróć z założeń
                </button>
              )}
            </div>

            {/* Compact summary view */}
            {!nutritionExpanded && (
              <button
                onClick={() => setNutritionExpanded(true)}
                className="w-full bg-ink-200/40 dark:bg-dark-elevated rounded-md p-3 hover:bg-ink-200/60 dark:hover:bg-dark-elevated/80 transition-colors text-left group"
              >
                <div className="flex items-center justify-between mb-1.5">
                  <div className="flex items-center gap-3">
                    <span className="text-[13px] font-medium text-ink-900 dark:text-dark-text tabular-nums">
                      {nutrition.kcal} kcal
                    </span>
                    <span className="text-[11px] text-ink-600 dark:text-dark-textMuted tabular-nums">
                      {nutrition.protein}B · {nutrition.fat}T · {nutrition.carbs}W
                    </span>
                    <span className="text-[11px] text-ink-600 dark:text-dark-textMuted">
                      ±{tolerance}%
                    </span>
                  </div>
                  <span className="text-[11px] text-brand font-medium flex items-center gap-0.5 group-hover:text-brand-dark">
                    Edytuj <Icon name="chevD" className="w-3 h-3" />
                  </span>
                </div>
                <div className="flex items-center gap-2 text-[10px] text-ink-600 dark:text-dark-textDim">
                  {scope === 'all' ? 'Z założeń dnia' : `Z założeń posiłku ${selectedMeal}`}
                  {isNutritionModified && (
                    <span className="inline-flex items-center gap-0.5 px-1.5 h-4 rounded-full bg-warning-light dark:bg-warning/15 text-warning-dark dark:text-warning-bright font-medium">
                      <Icon name="edit" className="w-2.5 h-2.5" stroke={2} />
                      zmodyfikowano
                    </span>
                  )}
                  {enabledMicroCount > 0 && (
                    <span className="inline-flex items-center px-1.5 h-4 rounded-full bg-brand-400 dark:bg-brand/15 text-brand font-medium">
                      +{enabledMicroCount} mikroelement{enabledMicroCount === 1 ? '' : 'ów'}
                    </span>
                  )}
                </div>
              </button>
            )}

            {/* Expanded editable view */}
            {nutritionExpanded && (
              <div className="bg-ink-200/40 dark:bg-dark-elevated rounded-md p-3 fade-in">
                {/* Header z info o źródle + lock toggle */}
                <div className="flex items-center justify-between mb-3 gap-3">
                  <div className="flex items-center gap-1.5 min-w-0">
                    <Icon name={nutritionUnlocked ? 'edit' : 'lock'} className={`w-3 h-3 shrink-0 ${nutritionUnlocked ? 'text-warning-dark dark:text-warning-bright' : 'text-ink-600 dark:text-dark-textMuted'}`} stroke={2} />
                    <span className="text-[11px] text-ink-700 dark:text-dark-textMuted truncate">
                      {scope === 'all'
                        ? <>Wartości z <span className="font-semibold text-ink-900 dark:text-dark-text">założeń dnia</span></>
                        : <>Wartości z <span className="font-semibold text-ink-900 dark:text-dark-text">założeń posiłku {selectedMeal}</span></>}
                      {!nutritionUnlocked && <span className="text-ink-600 dark:text-dark-textDim"> · zablokowane</span>}
                    </span>
                  </div>
                  <div className="flex items-center gap-2 shrink-0">
                    {!nutritionUnlocked ? (
                      <button
                        onClick={() => setNutritionUnlocked(true)}
                        className="text-[11px] text-brand hover:text-brand-dark font-medium flex items-center gap-1 transition-colors"
                      >
                        <Icon name="edit" className="w-3 h-3" stroke={2} />
                        Edytuj tylko dla tej generacji
                      </button>
                    ) : (
                      <button
                        onClick={restoreDefaults}
                        className="text-[11px] text-brand hover:text-brand-dark font-medium flex items-center gap-1 transition-colors"
                      >
                        <Icon name="arrL" className="w-3 h-3" /> Przywróć z założeń
                      </button>
                    )}
                    <button
                      onClick={() => setNutritionExpanded(false)}
                      className="text-[11px] text-ink-600 dark:text-dark-textMuted hover:text-ink-900 dark:hover:text-dark-text transition-colors flex items-center gap-0.5"
                    >
                      Zwiń <Icon name="chevU" className="w-3 h-3" />

                  </div>

                    { key: 'protein', label: 'Białko', unit: 'g' },
                    { key: 'fat', label: 'Tłuszcze', unit: 'g' },
                    { key: 'carbs', label: 'Węgl.', unit: 'g' },
                  ].map(({ key, label, unit }) => {
                    const val = nutrition[key];
                    const lo = Math.round(val * (1 - tolerance / 100));
                    const hi = Math.round(val * (1 + tolerance / 100));
                    return (
                      <div key={key}>
                        <label className="text-[10px] font-medium text-ink-700 dark:text-dark-textMuted mb-1 block">
                          {label}
                        </label>
                        <div className="relative">
                          <input
                            type="number"
                            value={val}
                            disabled={!nutritionUnlocked}
                            onChange={e => setNutrition(n => ({ ...n, [key]: Math.max(0, Number(e.target.value) || 0) }))}
                            className={`w-full h-8 pl-2 pr-7 text-[12px] font-medium tabular-nums rounded border outline-none transition-all ${
                              nutritionUnlocked
                                ? 'border-ink-200 dark:border-dark-border bg-white dark:bg-dark-surface text-ink-900 dark:text-dark-text focus:border-brand focus:ring-2 focus:ring-brand/20'
                                : 'border-ink-200/60 dark:border-dark-border/60 bg-ink-200/30 dark:bg-dark-surface/40 text-ink-700 dark:text-dark-textMuted cursor-not-allowed'
                            }`}
                            min="0"
                          />
                          <span className="absolute right-1.5 top-1/2 -translate-y-1/2 text-[9px] text-ink-600 dark:text-dark-textDim pointer-events-none">
                            {unit}
                          </span>
                        </div>
                        {/* Zakres — widoczny zawsze (skąd algorytm szuka) */}
                        <div className="text-[9px] text-ink-600 dark:text-dark-textDim mt-0.5 tabular-nums">
                          {lo}–{hi} {unit}
                        </div>
                        {nutrition[key] !== defaultNutrition[key] && (
                          <div className="text-[9px] text-warning-dark dark:text-warning-bright tabular-nums">
                            z {defaultNutrition[key]}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>

                {/* Tolerance slider */}
                <div className="flex items-center gap-3">
                  <label className={`text-[11px] font-medium whitespace-nowrap ${nutritionUnlocked ? 'text-ink-700 dark:text-dark-textMuted' : 'text-ink-600/60 dark:text-dark-textDim'}`}>
                    Tolerancja
                  </label>
                  <input
                    type="range"
                    value={tolerance}
                    disabled={!nutritionUnlocked}
                    onChange={e => setTolerance(Number(e.target.value))}
                    min="0" max="25" step="1"
                    className={`flex-1 accent-brand ${!nutritionUnlocked ? 'opacity-40 cursor-not-allowed' : ''}`}
                  />
                  <span className={`text-[12px] font-medium tabular-nums w-10 text-right ${nutritionUnlocked ? 'text-ink-900 dark:text-dark-text' : 'text-ink-700 dark:text-dark-textMuted'}`}>
                    ±{tolerance}%
                  </span>
                </div>

                {/* Microelements — collapsible */}
                <div className="mt-3 pt-3 border-t border-ink-300/50 dark:border-dark-border">
                  <button
                    onClick={() => setMicroExpanded(!microExpanded)}
                    className="w-full flex items-center justify-between text-[11px] font-semibold text-ink-700 dark:text-dark-textMuted uppercase tracking-wider hover:text-brand transition-colors"
                  >
                    <span className="flex items-center gap-1.5">
                      Mikroelementy
                      {enabledMicroCount > 0 && (
                        <span className="inline-flex items-center justify-center min-w-[18px] h-[18px] px-1 rounded-full bg-brand text-white text-[10px] font-semibold">
                          {enabledMicroCount}
                        </span>
                      )}
                    </span>
                    <Icon name={microExpanded ? 'chevU' : 'chevD'} className="w-3.5 h-3.5" />
                  </button>

                  {microExpanded && (
                    <div className="mt-2 space-y-2 fade-in">
                      <p className="text-[10px] text-ink-600 dark:text-dark-textDim">
                        Wybierz mikroelementy, które przepis ma uwzględnić w założonym zakresie.
                      </p>
                      {Object.entries(microElements).map(([key, m]) => (
                        <div key={key} className="flex items-center gap-2">
                          <label className="flex items-center gap-2 cursor-pointer flex-1 min-w-0">
                            <input
                              type="checkbox"
                              checked={m.enabled}
                              onChange={e => setMicroElements(me => ({ ...me, [key]: { ...me[key], enabled: e.target.checked } }))}
                              className="w-3.5 h-3.5 accent-brand shrink-0"
                            />
                            <span className={`text-[11px] truncate ${m.enabled ? 'text-ink-900 dark:text-dark-text font-medium' : 'text-ink-700 dark:text-dark-textMuted'}`}>
                              {m.label}
                            </span>
                          </label>
                          {m.enabled && (
                            <div className="flex items-center gap-1 shrink-0">
                              <input
                                type="number"
                                value={m.min}
                                onChange={e => setMicroElements(me => ({ ...me, [key]: { ...me[key], min: Number(e.target.value) || 0 } }))}
                                className="w-14 h-7 px-1.5 text-[11px] tabular-nums text-center rounded border border-ink-200 dark:border-dark-border bg-white dark:bg-dark-surface text-ink-900 dark:text-dark-text focus:border-brand outline-none"
                              />
                              <span className="text-[10px] text-ink-600 dark:text-dark-textMuted">–</span>
                              <input
                                type="number"
                                value={m.max}
                                onChange={e => setMicroElements(me => ({ ...me, [key]: { ...me[key], max: Number(e.target.value) || 0 } }))}
                                className="w-14 h-7 px-1.5 text-[11px] tabular-nums text-center rounded border border-ink-200 dark:border-dark-border bg-white dark:bg-dark-surface text-ink-900 dark:text-dark-text focus:border-brand outline-none"
                              />
                              <span className="text-[10px] text-ink-600 dark:text-dark-textDim w-6">{m.unit}</span>
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  )}
                </div>

                {isNutritionModified && (
                  <div className="mt-3 pt-2 border-t border-ink-300/50 dark:border-dark-border flex items-center gap-1.5 text-[11px] text-ink-700 dark:text-dark-textMuted">
                    <Icon name="info" className="w-3 h-3 text-info shrink-0" />
                    <span>Zmiany dotyczą tylko tej generacji — założenia programu nie zmienią się.</span>
                  </div>
                )}
              </div>
            )}
          </div>

          {/* WARSTWA 3 — Liczba przepisów */}
          <div>
            <div className="flex items-center justify-between mb-2">
              <label className="text-[11px] font-semibold text-ink-700 dark:text-dark-textMuted uppercase tracking-wider">
                Ile przepisów potrzebujesz?
              </label>
              <span className="text-[11px] text-ink-600 dark:text-dark-textMuted">
                ~{estimatedMatching} pasujących w bazie
              </span>
            </div>
            <div className="flex items-center gap-3">
              <input
                type="number"
                value={count}
                onChange={e => setCount(Math.max(1, Math.min(30, Number(e.target.value) || 1)))}
                className="w-16 h-9 px-2 text-center rounded-md border border-ink-200 dark:border-dark-border bg-white dark:bg-dark-elevated text-[13px] font-medium text-ink-900 dark:text-dark-text focus:border-brand focus:ring-2 focus:ring-brand/20 outline-none tabular-nums"
                min="1" max="30"
              />
              <input
                type="range"
                value={count}
                onChange={e => setCount(Number(e.target.value))}
                min="1" max="30"
                className="flex-1 accent-brand"
              />
            </div>
          </div>

          {/* Opcjonalne preferencje — collapsible */}
          <div>
            <button
              onClick={() => setAdvancedOpen(!advancedOpen)}
              className="flex items-center gap-1 text-[13px] font-medium text-brand hover:text-brand-dark transition-colors"
            >
              Dodatkowe preferencje doboru
              <Icon name={advancedOpen ? 'chevU' : 'chevD'} className="w-3.5 h-3.5" />
              {!advancedOpen && (prepTime || cuisine.length > 0 || season !== 'allyear') && (
                <span className="ml-1 inline-flex items-center justify-center min-w-[18px] h-[18px] px-1 rounded-full bg-brand text-white text-[10px] font-semibold">
                  {[prepTime, ...cuisine, season !== 'allyear' ? season : null].filter(Boolean).length}
                </span>
              )}
            </button>

            {advancedOpen && (
              <div className="mt-3 space-y-4 fade-in">
                {/* Czas przygotowania */}
                <div>
                  <label className="text-[11px] font-medium text-ink-700 dark:text-dark-textMuted mb-1.5 block">Czas przygotowania</label>
                  <div className="flex items-center gap-1.5 flex-wrap">
                    {[
                      { id: 'quick', label: 'Na szybko' },
                      { id: 'under30', label: '<30 min' },
                      { id: '30-60', label: '30-60 min' },
                      { id: 'over1h', label: '>1h' },
                    ].map(o => (
                      <button
                        key={o.id}
                        onClick={() => setPrepTime(prepTime === o.id ? null : o.id)}
                        className={`chip-press px-3 h-7 rounded-full border text-[11px] font-medium transition-all ${
                          prepTime === o.id
                            ? 'bg-brand-400 dark:bg-brand/20 border-brand text-brand'
                            : 'bg-white dark:bg-dark-elevated border-ink-200 dark:border-dark-border text-ink-700 dark:text-dark-textMuted hover:border-brand'
                        }`}
                      >
                        {o.label}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Rodzaj kuchni */}
                <div>
                  <label className="text-[11px] font-medium text-ink-700 dark:text-dark-textMuted mb-1.5 block">Rodzaj kuchni <span className="text-ink-500 dark:text-dark-textDim">(wybierz dowolnie wiele)</span></label>
                  <div className="flex items-center gap-1.5 flex-wrap">
                    {['Polska', 'Włoska', 'Azjatycka', 'Śródziemnomorska', 'Meksykańska'].map(c => {
                      const isActive = cuisine.includes(c);
                      return (
                        <button
                          key={c}
                          onClick={() => setCuisine(prev => isActive ? prev.filter(x => x !== c) : [...prev, c])}
                          className={`chip-press px-3 h-7 rounded-full border text-[11px] font-medium transition-all ${
                            isActive
                              ? 'bg-brand-400 dark:bg-brand/20 border-brand text-brand'
                              : 'bg-white dark:bg-dark-elevated border-ink-200 dark:border-dark-border text-ink-700 dark:text-dark-textMuted hover:border-brand'
                          }`}
                        >
                          {c}
                        </button>
                      );
                    })}
                  </div>
                </div>

                {/* Sezonowość */}
                <div>
                  <label className="text-[11px] font-medium text-ink-700 dark:text-dark-textMuted mb-1.5 block">Sezonowość</label>
                  <div className="flex items-center gap-1.5 flex-wrap">
                    {[
                      { id: 'allyear', label: 'Cały rok' },
                      { id: 'spring', label: 'Wiosna' },
                      { id: 'summer', label: 'Lato' },
                      { id: 'autumn', label: 'Jesień' },
                      { id: 'winter', label: 'Zima' },
                    ].map(o => (
                      <button
                        key={o.id}
                        onClick={() => setSeason(o.id)}
                        className={`chip-press px-3 h-7 rounded-full border text-[11px] font-medium transition-all ${
                          season === o.id
                            ? 'bg-brand-400 dark:bg-brand/20 border-brand text-brand'
                            : 'bg-white dark:bg-dark-elevated border-ink-200 dark:border-dark-border text-ink-700 dark:text-dark-textMuted hover:border-brand'
                        }`}
                      >
                        {o.label}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
        )}

        {/* Footer */}
        <div className="px-5 py-3 flex items-center justify-end gap-2 border-t border-ink-200 dark:border-dark-border bg-ink-100 dark:bg-dark-bg/50 shrink-0">
          {!generating && (
            <button onClick={onClose} className="btn-press h-9 px-4 rounded-md border border-ink-200 dark:border-dark-border bg-white dark:bg-dark-surface hover:border-ink-400 text-[13px] font-medium text-ink-800 dark:text-dark-text transition-all">
              Anuluj
            </button>
          )}
          <button
            onClick={() => {
              if (generating) return;
              setGenerating(true);
              setLoadingPhase(0);
              const payload = {
                count,
                source,
                ignoredPrefs: Array.from(ignoredPrefs),
                nutrition,
                tolerance,
                microElements: Object.fromEntries(Object.entries(microElements).filter(([_, m]) => m.enabled)),
                prepTime, cuisine, season,
                scope,
                mealType: scope === 'single' ? selectedMeal : null,
                favoriteDishTypes: Object.fromEntries(
                  Object.entries(favoriteDishTypes).map(([k, v]) => [k, Array.from(v)])
                ),
              };
              setTimeout(() => onGenerate(payload), 2400);
            }}
            disabled={generating}
            className={`btn-press h-9 px-5 rounded-md text-white font-medium text-[13px] flex items-center gap-2 ${
              !generating ? 'btn-primary' : 'bg-ink-400 dark:bg-dark-borderLight cursor-not-allowed'
            }`}
          >
            {generating ? (
              <>
                <div className="w-3.5 h-3.5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                Generuję...
              </>
            ) : (
              <>
                <Icon name="sparkles" className="w-3.5 h-3.5" /> Autogeneruj {scope === 'all' ? 'po ' : ''}{count} {count === 1 ? 'przepis' : count < 5 ? 'przepisy' : 'przepisów'}
              </>
            )}
          </button>
        </div>
      </div>
    </div>
  );
};

// ============================================================
// MEALPLAN GENERATOR MODAL — układanie jadłospisu (2 tryby)
// mode='arrange' — są przepisy w programie, układamy je w jadłospis
// mode='generate-from-scratch' — brak przepisów, dobieramy z bazy + układamy
// ============================================================
const MEALPLAN_MODE_CONFIG = {
  arrange: {
    title: 'Ułóż jadłospis',
    subtitle: (count) => `Algorytm rozłoży ${count} przepisów ze zbioru w jadłospis`,
    cta: 'Ułóż jadłospis',
    showRecipeCountSlider: false,
  },
  'generate-from-scratch': {
    title: 'Autogeneruj jadłospis od zera',
    subtitle: () => 'W tle dobierzemy przepisy z bazy, a potem ułożymy je w jadłospis',
    cta: 'Autogeneruj jadłospis',
    showRecipeCountSlider: true,
  },
};

const MealplanGeneratorModal = ({
  mode = 'arrange',
  dayType,
  allDayTypes = [], // pełna lista typów dni programu (przy hasMultipleDayTypes)
  hasMultipleDayTypes = false,
  recipesCount = 5,
  microElementsFromSetup = [], // array of {key, label, unit} from program setup
  clientKeyValues = [], // kluczowe wartości z profilu klienta — array of {key, label, unit}
  clientName = 'Karolina',
  prefill = null, // { source, ignoredPrefs, preset: { id, config } } — z AutogenFromScratchModal po wyborze presetu
  onBackToPresets = null, // jeśli przyszliśmy z presetu, button "← Wróć do presetów"
  onClose,
  onGenerate,
}) => {
  const config = MEALPLAN_MODE_CONFIG[mode];

  // Source — w trybie generate-from-scratch chcemy też wybrać źródło przepisów
  const [source, setSource] = useState(prefill?.source || 'base');

  // Sekcja 1 — priorytet
  const [priority, setPriority] = useState('accuracy'); // 'accuracy' | 'variety'

  // Sekcja 0 (tylko mode=generate-from-scratch) — ile przepisów dobrać
  const [recipesPerMeal, setRecipesPerMeal] = useState(prefill?.preset?.config?.recipesPerMeal || 7);

  // Loading state — po kliknięciu CTA pokazujemy 2.4s loading screen z rotującymi komunikatami
  const [generating, setGenerating] = useState(false);
  const [loadingPhase, setLoadingPhase] = useState(0);

  // Faza loadingu — 4 etapy po ~700ms
  React.useEffect(() => {
    if (!generating) return;
    const timers = [
      setTimeout(() => setLoadingPhase(1), 700),
      setTimeout(() => setLoadingPhase(2), 1400),
      setTimeout(() => setLoadingPhase(3), 2100),
    ];
    return () => timers.forEach(clearTimeout);
  }, [generating]);

  // Sekcja 2 — multi-select chipy (≥1 z głównych) — GLOBALNE wartości
  const [selectedMacros, setSelectedMacros] = useState(prefill?.preset?.config?.selectedMacros || {
    energy: true,
    protein: true,
    fat: false,
    carbs: false,
  });
  // selectedKeyValues — kluczowe wartości z profilu klienta (opcjonalne, bez minimum)
  // Preset 'precise' ma "all" — wtedy zaznaczamy wszystkie z clientKeyValues
  const initialKeyValues = (() => {
    const cfg = prefill?.preset?.config?.selectedKeyValues;
    if (cfg === 'all') return Object.fromEntries(clientKeyValues.map(kv => [kv.key, true]));
    if (cfg && typeof cfg === 'object') return cfg;
    return {};
  })();
  const [selectedKeyValues, setSelectedKeyValues] = useState(initialKeyValues);

  // Per-type mode — opcjonalny, tylko gdy hasMultipleDayTypes
  const [perTypeEnabled, setPerTypeEnabled] = useState(false);
  const [activeTypeId, setActiveTypeId] = useState(allDayTypes[0]?.id || null);

  // Sekcja 3 — zaawansowane (collapsed) — auto-otwarte gdy mamy prefill (user przyszedł "Dostosuj")
  const [advancedOpen, setAdvancedOpen] = useState(!!prefill);

  // 3a — schemat powtarzania
  const [repeatScheme, setRepeatScheme] = useState(prefill?.preset?.config?.repeatScheme || 'none');

  // 3a' — wyjątki per posiłek (override globalnego schematu)
  // Klucz: typ posiłku (np. 'Obiad'), wartość: schemat ('none' | 'twoinrow' | 'threeinrow' | 'weekendsame')
  const [mealOverrides, setMealOverrides] = useState({});

  const mealTypes = (dayType?.meals || []).map(m => m.type);

  const setMealOverride = (mealType, scheme) => {
    setMealOverrides(prev => {
      if (scheme === null) {
        const next = { ...prev };
        delete next[mealType];
        return next;
      }
      return { ...prev, [mealType]: scheme };
    });
  };

  // 3b — marginesy (per wybrana wartość) — GLOBALNE
  const DEFAULT_MARGIN = prefill?.preset?.config?.margins ?? 10;
  const DEFAULT_PRIORITY = prefill?.preset?.config?.priority ?? 100;
  const [marginsAndPriority, setMarginsAndPriority] = useState({
    energy:  { margin: DEFAULT_MARGIN, priority: DEFAULT_PRIORITY },
    protein: { margin: DEFAULT_MARGIN, priority: DEFAULT_PRIORITY },
    fat:     { margin: DEFAULT_MARGIN, priority: DEFAULT_PRIORITY },
    carbs:   { margin: DEFAULT_MARGIN, priority: DEFAULT_PRIORITY },
  });

  // Per-type data — kopia globalnych wartości na typ dnia
  // { [dayTypeId]: { selectedMacros, selectedKeyValues, marginsAndPriority } }
  const [perTypeData, setPerTypeData] = useState({});

  // Włączenie trybu per-type — kopiujemy globalne ustawienia jako start point dla każdego typu
  const togglePerType = () => {
    setPerTypeEnabled(prev => {
      const next = !prev;
      if (next && Object.keys(perTypeData).length === 0) {
        // Pierwszy raz włączamy — kopiujemy globalne wartości do każdego typu dnia
        const initial = {};
        allDayTypes.forEach(dt => {
          initial[dt.id] = {
            selectedMacros: { ...selectedMacros },
            selectedKeyValues: { ...selectedKeyValues },
            marginsAndPriority: JSON.parse(JSON.stringify(marginsAndPriority)),
          };
        });
        setPerTypeData(initial);
      }
      return next;
    });
  };

  // Aktywny zestaw — globalny lub konkretnego typu dnia
  const activeData = perTypeEnabled && perTypeData[activeTypeId]
    ? perTypeData[activeTypeId]
    : { selectedMacros, selectedKeyValues, marginsAndPriority };

  // Aktywny dayType — w trybie per-type bierzemy odpowiedni typ z listy, w globalnym propsy
  const activeDayType = (perTypeEnabled && allDayTypes.find(dt => dt.id === activeTypeId)) || dayType;

  // Mapa: klucz makro → wartość z założeń + jednostka (do wyświetlenia obok nazwy)
  // Dla kluczowych wartości z profilu — placeholder (w produkcji byłyby z setupu)
  const macroValueFromSetup = (key) => {
    if (!activeDayType) return null;
    if (key === 'energy')  return { value: activeDayType.kcal,    unit: 'kcal' };
    if (key === 'protein') return { value: activeDayType.protein, unit: 'g' };
    if (key === 'fat')     return { value: activeDayType.fat,     unit: 'g' };
    if (key === 'carbs')   return { value: activeDayType.carbs,   unit: 'g' };
    return null;
  };
  const keyValueFromSetup = (key) => {
    // Mock — w produkcji wartości z założeń per typ dnia
    const mock = { fiber: { value: 30, unit: 'g' }, iron: { value: 18, unit: 'mg' }, magnesium: { value: 320, unit: 'mg' }, b9: { value: 400, unit: 'µg' } };
    return mock[key] || null;
  };

  const updateActive = (patch) => {
    if (perTypeEnabled) {
      setPerTypeData(prev => ({
        ...prev,
        [activeTypeId]: { ...prev[activeTypeId], ...patch },
      }));
    } else {
      if (patch.selectedMacros) setSelectedMacros(patch.selectedMacros);
      if (patch.selectedKeyValues) setSelectedKeyValues(patch.selectedKeyValues);
      if (patch.marginsAndPriority) setMarginsAndPriority(patch.marginsAndPriority);
    }
  };

  // Walidacja — zaznaczyć ≥1 makro (globalnie lub w każdym typie gdy per-type)
  const macrosCount = Object.values(activeData.selectedMacros).filter(Boolean).length;
  const canSubmit = perTypeEnabled
    ? allDayTypes.every(dt => Object.values((perTypeData[dt.id]?.selectedMacros || {})).filter(Boolean).length >= 1)
    : macrosCount >= 1;

  // Helper toggles — operują na aktywnym zestawie
  const toggleMacro = (key) => {
    const current = activeData.selectedMacros;
    const wouldBeOff = current[key];
    const remaining = Object.entries(current).filter(([k, v]) => k !== key && v).length;
    if (wouldBeOff && remaining === 0) return;
    updateActive({ selectedMacros: { ...current, [key]: !current[key] } });
  };

  const toggleKeyValue = (key) => {
    const current = activeData.selectedKeyValues;
    updateActive({ selectedKeyValues: { ...current, [key]: !current[key] } });
  };

  const updateMarginPriority = (key, field, value) => {
    const current = activeData.marginsAndPriority;
    updateActive({
      marginsAndPriority: {
        ...current,
        [key]: { ...(current[key] || { margin: DEFAULT_MARGIN, priority: DEFAULT_PRIORITY }), [field]: Number(value) || 0 },
      },
    });
  };

  // Macro chips data
  const macroChips = [
    { key: 'energy', label: 'Energia', icon: 'flame', tone: 'warning' },
    { key: 'protein', label: 'Białko', icon: 'meat', tone: 'error' },
    { key: 'fat', label: 'Tłuszcze', icon: 'oil', tone: 'info' },
    { key: 'carbs', label: 'Węglowodany', icon: 'wheat', tone: 'success' },
  ];

  // Schemat powtarzania — visualizacja kropek (7 dni: Pn,Wt,Śr,Cz,Pt,Sb,Nd)
  const repeatPatterns = {
    none:        [1, 2, 3, 4, 5, 6, 7],          // wszystkie unikalne
    twoinrow:    [1, 1, 2, 2, 3, 3, 4],          // 2 dni z rzędu te same: Pn-Wt, Śr-Cz, Pt-Sb, Nd
    threeinrow:  [1, 1, 1, 2, 2, 2, 3],          // 3 dni z rzędu te same: Pn-Wt-Śr, Cz-Pt-Sb, Nd
    weekendsame: [1, 2, 3, 4, 5, 6, 6],          // Sb=Nd, Pn-Pt różne
  };
  const getDotColor = (idx, pattern) => {
    const hue = (pattern[idx] * 50) % 360;
    return `hsl(${hue}, 60%, 65%)`;
  };

  return (
    <div
      className="fixed inset-0 z-50 bg-deepviolet/50 dark:bg-black/70 backdrop-in flex items-center justify-center p-4"
    >
      <div
        className="bg-white dark:bg-dark-surface rounded-lg shadow-e4 w-full max-w-[600px] max-h-[90vh] overflow-hidden fade-in flex flex-col"
        onClick={e => e.stopPropagation()}
      >
        {/* Header */}
        <div className="px-5 py-4 flex items-center justify-between border-b border-ink-200 dark:border-dark-border shrink-0">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 rounded-md bg-gradient-brand text-white flex items-center justify-center shadow-brand-sm">
              <Icon name="sparkles" className="w-4 h-4" stroke={2} />
            </div>
            <div>
              <h3 className="text-[15px] font-semibold text-ink-900 dark:text-dark-text">{config.title}</h3>
              <p className="text-[12px] text-ink-700 dark:text-dark-textMuted mt-0.5">
                {typeof config.subtitle === 'function' ? config.subtitle(recipesCount) : config.subtitle}
              </p>
            </div>
          </div>
          <button onClick={onClose} className="w-8 h-8 rounded-md hover:bg-ink-200 dark:hover:bg-dark-elevated flex items-center justify-center text-ink-700 dark:text-dark-textMuted btn-press">
            <Icon name="x" className="w-4 h-4" />
          </button>
        </div>

        {/* Body — normal vs loading */}
        {generating ? (
          <div className="flex-1 overflow-hidden flex flex-col items-center justify-center px-8 py-10 text-center fade-in">
            <div className="relative mb-6 w-16 h-16">
              <div className="absolute inset-0 border-4 border-brand-400 dark:border-brand/20 rounded-full"></div>
              <div className="absolute inset-0 border-4 border-brand border-t-transparent rounded-full animate-spin"></div>
              <div className="absolute inset-0 flex items-center justify-center">
                <Icon name="sparkles" className="w-6 h-6 text-brand" />
              </div>
            </div>
            <h2 className="text-[15px] font-semibold text-ink-900 dark:text-dark-text mb-1">
              {mode === 'arrange' ? `Układam jadłospis dla ${clientName}` : `Tworzę jadłospis dla ${clientName}`}
            </h2>
            <p className="text-[12px] text-ink-700 dark:text-dark-textMuted mb-6">
              {mode === 'arrange' ? `Rozkładam ${recipesCount} przepisów na ${(dayType?.meals?.length || 4)} posiłków` : 'Przeszukuję bazę przepisów'}
            </p>
            <div className="w-full max-w-[380px] space-y-1.5 text-left">
              {(mode === 'arrange'
                ? [
                    'Sprawdzam preferencje i wykluczenia',
                    'Dopasowuję przepisy do założeń kcal i makro',
                    perTypeEnabled ? 'Uwzględniam ustawienia per typ dnia' : 'Uwzględniam wybrane priorytety',
                    'Układam posiłki na cały okres programu',
                  ]
                : [
                    'Przeglądam bazę przepisów',
                    'Sprawdzam preferencje i wykluczenia',
                    'Dobieram przepisy do założeń kcal i makro',
                    'Układam posiłki na cały okres programu',
                  ]
              ).map((label, i) => {
                const done = i < loadingPhase;
                const active = i === loadingPhase;
                return (
                  <div key={i} className={`flex items-center gap-2 px-3 py-2 rounded-sm text-[12px] transition-all ${active ? 'bg-brand-400/40 dark:bg-brand/10' : 'bg-transparent'}`}>
                    {done
                      ? <Icon name="check" className="w-3.5 h-3.5 text-success-dark dark:text-success-bright shrink-0" stroke={3} />
                      : active
                      ? <div className="w-3.5 h-3.5 border-2 border-brand border-t-transparent rounded-full animate-spin shrink-0"></div>
                      : <div className="w-3.5 h-3.5 rounded-full border border-ink-300 dark:border-dark-borderLight shrink-0"></div>
                    }
                    <span className={done ? 'text-ink-600 dark:text-dark-textMuted' : active ? 'text-ink-900 dark:text-dark-text font-medium' : 'text-ink-500 dark:text-dark-textDim'}>{label}</span>
                  </div>
                );
              })}
            </div>
          </div>
        ) : (
        <div className="flex-1 overflow-y-auto px-5 py-4 space-y-5">

          {/* Back to presets — gdy weszliśmy z AutogenFromScratchModal */}
          {onBackToPresets && (
            <button
              onClick={onBackToPresets}
              className="flex items-center gap-1.5 text-[11px] text-brand hover:text-brand-dark font-medium transition-colors -mt-1 -mb-1"
            >
              <Icon name="arrL" className="w-3 h-3" stroke={2} /> Wróć do presetów
            </button>
          )}

          {/* Sekcja Source — skąd brać przepisy (tylko mode=generate-from-scratch) */}
          {config.showRecipeCountSlider && (
            <div>
              <div className="text-[11px] font-semibold text-ink-700 dark:text-dark-textMuted uppercase tracking-wider mb-2">
                Skąd brać przepisy?
              </div>
              <div className="grid grid-cols-3 gap-2">
                {AUTOGEN_SOURCES.map(s => {
                  const isActive = source === s.id;
                  return (
                    <button
                      key={s.id}
                      onClick={() => setSource(s.id)}
                      className={`text-left p-2.5 rounded-md border transition-all ${
                        isActive
                          ? 'border-brand bg-brand-400/30 dark:bg-brand/10'
                          : 'border-ink-200 dark:border-dark-border bg-white dark:bg-dark-elevated hover:border-brand-300 dark:hover:border-brand/40'
                      }`}
                    >
                      <Icon name={s.icon} className={`w-3.5 h-3.5 mb-1 ${isActive ? 'text-brand' : 'text-ink-700 dark:text-dark-textMuted'}`} stroke={2} />
                      <div className={`text-[11px] font-semibold mb-0.5 ${isActive ? 'text-brand' : 'text-ink-900 dark:text-dark-text'}`}>{s.label}</div>
                      <div className="text-[9px] text-ink-700 dark:text-dark-textMuted">{s.desc}</div>
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          {/* Sekcja 0 — slider liczby przepisów (tylko mode=generate-from-scratch) */}
          {config.showRecipeCountSlider && (
            <div>
              <div className="flex items-center justify-between mb-2">

                              {setup && (

                                  {setup.value} {setup.unit}
                                </span>
                              )}
                            </div>
                            {setup && (
                              <div className="text-[10px] text-ink-600 dark:text-dark-textDim tabular-nums mt-0.5 ml-[18px]">
                                zakres: {lo}–{hi} {setup.unit}
                              </div>
                            )}
                          </div>
                          <div className="relative">
                            <input
                              type="number"
                              value={mp.margin}
                              onChange={e => updateMarginPriority(kv.key, 'margin', e.target.value)}
                              className="w-full h-7 pl-2 pr-6 text-[12px] tabular-nums rounded border border-ink-200 dark:border-dark-border bg-white dark:bg-dark-surface text-ink-900 dark:text-dark-text focus:border-brand outline-none"
                              min="0" max="50"
                            />
                            <span className="absolute right-1.5 top-[14px] text-[10px] text-ink-600 dark:text-dark-textDim">%</span>
                          </div>
                          <div className="relative">
                            <input
                              type="number"
                              value={mp.priority}
                              onChange={e => updateMarginPriority(kv.key, 'priority', e.target.value)}
                              className="w-full h-7 pl-2 pr-6 text-[12px] tabular-nums rounded border border-ink-200 dark:border-dark-border bg-white dark:bg-dark-surface text-ink-900 dark:text-dark-text focus:border-brand outline-none"
                              min="0" max="100"
                            />
                            <span className="absolute right-1.5 top-[14px] text-[10px] text-ink-600 dark:text-dark-textDim">%</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* Memorize for next time */}
          <div className="flex items-center gap-2 pt-2">
            <input type="checkbox" id="remember-mealplan" defaultChecked className="w-3.5 h-3.5 accent-brand" />
            <label htmlFor="remember-mealplan" className="text-[11px] text-ink-700 dark:text-dark-textMuted cursor-pointer">
              Zapamiętamy te ustawienia dla kolejnych programów
            </label>
          </div>
        </div>
        )}

        {/* Footer */}
        <div className="px-5 py-3 flex items-center justify-end gap-2 border-t border-ink-200 dark:border-dark-border bg-ink-100 dark:bg-dark-bg/50 shrink-0">
          {!generating && (
            <button onClick={onClose} className="btn-press h-9 px-4 rounded-md border border-ink-200 dark:border-dark-border bg-white dark:bg-dark-surface hover:border-ink-400 text-[13px] font-medium text-ink-800 dark:text-dark-text transition-all">
              Anuluj
            </button>
          )}
          <button
            onClick={() => {
              if (generating) return;
              setGenerating(true);
              setLoadingPhase(0);
              const payload = {
                mode,
                source,
                priority,
                recipesPerMeal: config.showRecipeCountSlider ? recipesPerMeal : null,
                selectedMacros: Object.keys(selectedMacros).filter(k => selectedMacros[k]),
                selectedKeyValues: Object.keys(selectedKeyValues).filter(k => selectedKeyValues[k]),
                repeatScheme: hasMultipleDayTypes ? 'none' : repeatScheme,
                mealOverrides: hasMultipleDayTypes ? {} : mealOverrides,
                marginsAndPriority,
                perTypeEnabled,
                perTypeData: perTypeEnabled ? perTypeData : null,
                ignoredPrefs: prefill?.ignoredPrefs || [],
              };
              setTimeout(() => onGenerate(payload), 2400);
            }}
            disabled={!canSubmit || generating}
            className={`btn-press h-9 px-5 rounded-md text-white font-medium text-[13px] flex items-center gap-2 ${
              canSubmit && !generating ? 'btn-primary' : 'bg-ink-400 dark:bg-dark-borderLight cursor-not-allowed'
            }`}
          >
            {generating ? (
              <>
                <div className="w-3.5 h-3.5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                Generuję...
              </>
            ) : (
              <>
                <Icon name="sparkles" className="w-3.5 h-3.5" /> {config.cta}
              </>
            )}
          </button>
        </div>
      </div>
    </div>
  );
};

const AUTOGEN_SOURCES = [
  { id: 'base',    icon: 'sparkles', label: 'Baza Alloweat',     desc: '4128 przepisów',  count: 4128 },
  { id: 'library', icon: 'note',     label: 'Moja biblioteka',   desc: '47 przepisów',    count: 47 },
  { id: 'mixed',   icon: 'shuffle',  label: 'Mieszanie',         desc: '4175 z obu',      count: 4175 },
];

// Taksonomia rodzajów potraw — z bazy tagów Alloweat (25 pozycji)
const MEAL_TYPES_TAXONOMY = [
  'Bowl', 'Ciastka', 'Ciasto', 'Curry', 'Gofry', 'Jaglanka', 'Jednogarnkowe',
  'Jogurt', 'Kanapka', 'Kaszotto', 'Koktajl', 'Lody', 'Makaron', 'Naleśniki',
  'Omlet', 'Owsianka', 'Pancake', 'Pizza', 'Risotto', 'Ryżanka', 'Sałatka',
  'Shake', 'Smoothie', 'Tortilla', 'Zupa',
];

// Mock ulubionych typów potraw z profilu klienta (Karolina) — per typ posiłku
// Docelowo backend zwraca to z profilu klienta (model c — hybrydowy)
const MOCK_FAVORITE_DISH_TYPES = {
  'Śniadanie': ['Owsianka', 'Jaglanka', 'Kanapka'],
  'II śniadanie': ['Jogurt', 'Smoothie'],
  'Lunch': ['Sałatka', 'Bowl'],
  'Obiad': ['Bowl', 'Naleśniki', 'Curry'],
  'Podwieczorek': ['Koktajl', 'Ciastka'],
  'Kolacja': ['Jednogarnkowe', 'Zupa'],
  'Przekąska': [], // brak — algorytm dobierze różne typy
  'Deser': ['Lody'],
  'Przed treningiem': ['Smoothie'],
  'Podczas treningu': [],
  'Po treningu': ['Shake', 'Smoothie'],
  'Suplementacja': [],
};

const AutogenFromScratchModal = ({
  dayType,
  allDayTypes = [],
  hasMultipleDayTypes = false,
  clientName = 'Karolina',
  clientPreferences,
  clientKeyValues = [],
  onClose,
  onGenerate,
  onCustom, // wywołane przy "Własne" — parent otwiera MealplanGeneratorModal w trybie generate-from-scratch
}) => {
  // 'select' = wybór presetu/source, 'summary' = podgląd presetu, 'generating' = loading
  const [step, setStep] = useState('select');
  const [source, setSource] = useState('base');
  const [selectedPreset, setSelectedPreset] = useState(null);
  const [loadingPhase, setLoadingPhase] = useState(0);
  const [ignoredPrefs, setIgnoredPrefs] = useState(new Set());
  const toggleIgnore = (key) => {
    setIgnoredPrefs(prev => {
      const next = new Set(prev);
      if (next.has(key)) next.delete(key); else next.add(key);
      return next;
    });
  };

  React.useEffect(() => {
    if (step !== 'generating') return;
    const timers = [
      setTimeout(() => setLoadingPhase(1), 700),
      setTimeout(() => setLoadingPhase(2), 1400),
      setTimeout(() => setLoadingPhase(3), 2100),
    ];
    return () => timers.forEach(clearTimeout);
  }, [step]);

  const preset = selectedPreset ? AUTOGEN_PRESETS[selectedPreset] : null;

  // Profile preferences — pełna lista z toggle Ignoruj (jak w RecipeAutogenModal)
  const {
    allergens = [],
    diet,
    dislikedCategories = [],
    dislikedProducts = [],
  } = clientPreferences || {};

  const profilePrefItems = [
    ...(diet ? [{ key: 'diet', label: `Dieta: ${diet}`, icon: 'apple', tone: 'success' }] : []),
    ...allergens.map((a, i) => ({ key: `allergen-${i}`, label: `Wyklucz: ${a}`, icon: 'warning', tone: 'error' })),
    ...dislikedCategories.map((c, i) => ({ key: `dcat-${i}`, label: `Nie lubi: ${c}`, icon: 'dislike', tone: 'warning' })),
    ...dislikedProducts.map((p, i) => ({ key: `dprod-${i}`, label: `Nie lubi: ${p}`, icon: 'dislike', tone: 'warning' })),
  ];

  const toneClasses = {
    error:   { bg: 'bg-error-light dark:bg-error/15',     border: 'border-error/30',   text: 'text-error-dark dark:text-error-bright',     icon: 'text-error-dark dark:text-error-bright' },
    success: { bg: 'bg-success-light dark:bg-success/15', border: 'border-success/30', text: 'text-success-dark dark:text-success-bright', icon: 'text-success-dark dark:text-success-bright' },
    warning: { bg: 'bg-warning-light dark:bg-warning/15', border: 'border-warning/30', text: 'text-warning-dark dark:text-warning-bright', icon: 'text-warning-dark dark:text-warning-bright' },
  };

  // Aktywne (nieignorowane) — do summary view i loading
  const activeProfileItems = profilePrefItems.filter(item => !ignoredPrefs.has(item.key));

  // Ulubione typy potraw per posiłek — z profilu klienta (mock), edytowalne per-generacja
  const [favoriteDishTypes, setFavoriteDishTypes] = useState(() => {
    const initial = {};
    Object.entries(MOCK_FAVORITE_DISH_TYPES).forEach(([meal, types]) => {
      initial[meal] = new Set(types);
    });
    return initial;
  });
  const [expandedEditMeal, setExpandedEditMeal] = useState(null);
  const toggleDishType = (mealName, dishType) => {
    setFavoriteDishTypes(prev => {
      const next = { ...prev };
      const set = new Set(next[mealName] || []);
      if (set.has(dishType)) set.delete(dishType); else set.add(dishType);
      next[mealName] = set;
      return next;
    });
  };
  // "Ignoruj wszystkie typy" — globalny reset
  const ignoreAllDishTypes = () => {
    const cleared = {};
    (dayType?.meals || []).forEach(m => { cleared[m.type] = new Set(); });
    setFavoriteDishTypes(cleared);
  };
  const restoreAllDishTypes = () => {
    const restored = {};
    Object.entries(MOCK_FAVORITE_DISH_TYPES).forEach(([meal, types]) => {
      restored[meal] = new Set(types);
    });
    setFavoriteDishTypes(restored);
  };
  const totalActiveDishTypes = Object.values(favoriteDishTypes).reduce((acc, set) => acc + set.size, 0);
  const profileTotalDishTypes = Object.values(MOCK_FAVORITE_DISH_TYPES).reduce((a, t) => a + t.length, 0);
  const isAllDishTypesIgnored = totalActiveDishTypes === 0 && profileTotalDishTypes > 0;

  const handlePresetClick = (presetId) => {
    setSelectedPreset(presetId);
    setStep('summary');
  };

  const handleGenerate = () => {
    setStep('generating');
    setLoadingPhase(0);
    setTimeout(() => {
      onGenerate({
        preset: selectedPreset,
        source,
        config: preset.config,
        ignoredPrefs: Array.from(ignoredPrefs),
        favoriteDishTypes: Object.fromEntries(
          Object.entries(favoriteDishTypes).map(([k, v]) => [k, Array.from(v)])
        ),
      });
    }, 2400);
  };

  const handleCustom = () => {
    onCustom({
      source,
      ignoredPrefs: Array.from(ignoredPrefs),
      preset: selectedPreset ? { id: selectedPreset, config: preset.config } : null,
      favoriteDishTypes: Object.fromEntries(
        Object.entries(favoriteDishTypes).map(([k, v]) => [k, Array.from(v)])
      ),
    });
  };

  return (
    <div
      className="fixed inset-0 z-50 bg-deepviolet/50 dark:bg-black/70 backdrop-in flex items-center justify-center p-4"
      onClick={step !== 'generating' ? onClose : undefined}
    >
      <div
        className="bg-white dark:bg-dark-surface rounded-lg shadow-e4 w-full max-w-[680px] max-h-[90vh] overflow-hidden fade-in flex flex-col"
        onClick={e => e.stopPropagation()}
      >
        {/* Header */}
        <div className="px-5 py-4 flex items-center justify-between border-b border-ink-200 dark:border-dark-border shrink-0">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 rounded-md bg-gradient-brand text-white flex items-center justify-center shadow-brand-sm">
              <Icon name="sparkles" className="w-4 h-4" stroke={2} />
            </div>
            <div>
              <h3 className="text-[15px] font-semibold text-ink-900 dark:text-dark-text">
                {step === 'select' && 'Autogeneruj jadłospis'}
                {step === 'summary' && `Preset: ${preset?.name}`}
                {step === 'generating' && `Tworzę jadłospis dla ${clientName}`}
              </h3>
              <p className="text-[12px] text-ink-700 dark:text-dark-textMuted mt-0.5">
                {step === 'select' && 'Wybierz preset lub dostosuj ustawienia samodzielnie'}
                {step === 'summary' && 'Sprawdź ustawienia i wygeneruj jadłospis'}
                {step === 'generating' && 'Pracuję nad propozycją...'}
              </p>
            </div>
          </div>
          {step !== 'generating' && (
            <button onClick={onClose} className="w-8 h-8 rounded-md hover:bg-ink-200 dark:hover:bg-dark-elevated flex items-center justify-center text-ink-700 dark:text-dark-textMuted btn-press">
              <Icon name="x" className="w-4 h-4" />
            </button>
          )}
        </div>

        {/* Body */}
        {step === 'select' && (
          <div className="flex-1 overflow-y-auto px-5 py-4 space-y-5">

            {/* Profil klienta — edytowalne wiersze z toggle Ignoruj */}
            {profilePrefItems.length > 0 && (
              <div className="bg-brand-400/30 dark:bg-brand/5 border border-brand/20 rounded-md p-3">
                <div className="flex items-center justify-between mb-2">
                  <div className="text-[11px] font-semibold text-ink-700 dark:text-dark-textMuted uppercase tracking-wider flex items-center gap-1.5">
                    <Icon name="users" className="w-3.5 h-3.5 text-brand" stroke={2} />
                    Z profilu klienta
                  </div>
                  <span className="text-[10px] text-ink-600 dark:text-dark-textMuted">Algorytm zawsze to uwzględnia</span>
                </div>
                <div className="space-y-1.5">
                  {profilePrefItems.map(item => {
                    const isIgnored = ignoredPrefs.has(item.key);
                    const tc = toneClasses[item.tone];
                    return (
                      <div key={item.key} className={`flex items-center gap-2 ${isIgnored ? 'opacity-50' : ''} transition-opacity`}>
                        <span className={`inline-flex items-center gap-1 px-2 h-6 rounded-full ${tc.bg} border ${tc.border} text-[11px] font-medium ${tc.text} ${isIgnored ? 'line-through' : ''}`}>
                          <Icon name={item.icon} className={`w-3 h-3 ${tc.icon}`} stroke={2.5} />
                          {item.label}
                        </span>
                        <button
                          onClick={() => toggleIgnore(item.key)}
                          className={`ml-auto text-[11px] font-medium transition-colors ${
                            isIgnored
                              ? 'text-brand hover:text-brand-dark'
                              : 'text-ink-600 dark:text-dark-textMuted hover:text-ink-900 dark:hover:text-dark-text'
                          }`}
                        >
                          {isIgnored ? 'Przywróć' : 'Ignoruj'}
                        </button>
                      </div>
                    );
                  })}

                </div>
                {ignoredPrefs.size > 0 && (
                  <div className="mt-2 pt-2 border-t border-brand/20 flex items-center gap-1.5 text-[11px] text-ink-700 dark:text-dark-textMuted">
                    <Icon name="info" className="w-3 h-3 text-info shrink-0" />
                    <span>Ignorujesz {ignoredPrefs.size} {ignoredPrefs.size === 1 ? 'preferencję' : 'preferencje'} tylko dla tej generacji — profil klienta zostaje bez zmian.</span>
                  </div>
                )}
              </div>
            )}

            {/* Lubi rodzaje potraw — pełna edycja per-meal (analogicznie do AutogenRecipesModal scope=all) */}
            {dayType?.meals && profileTotalDishTypes > 0 && (
              <div className="rounded-md border border-brand/20 bg-brand-400/30 dark:bg-brand/5 p-3">
                <div className="flex items-center justify-between mb-2">
                  <div className="flex items-center gap-1.5">
                    <Icon name="heart" className="w-3.5 h-3.5 text-brand" stroke={2} />
                    <span className="text-[11px] font-semibold text-ink-700 dark:text-dark-textMuted uppercase tracking-wider">
                      Lubi rodzaje potraw
                    </span>
                  </div>
                  <div className="flex items-center gap-2">
                    <span className="text-[10px] text-ink-600 dark:text-dark-textMuted">Z profilu klienta</span>
                    {totalActiveDishTypes > 0 ? (
                      <button
                        onClick={ignoreAllDishTypes}
                        className="text-[10px] text-ink-600 dark:text-dark-textMuted hover:text-brand font-medium transition-colors"
                        title="Wyłącz wszystkie preferencje typów dla tej generacji"
                      >
                        Ignoruj wszystkie
                      </button>
                    ) : (
                      <button
                        onClick={restoreAllDishTypes}
                        className="text-[10px] text-brand hover:text-brand-dark font-medium transition-colors"
                      >
                        Przywróć z profilu
                      </button>
                    )}
                  </div>
                </div>
                <div className="space-y-1.5">
                  {dayType.meals.map(m => {
                    const active = favoriteDishTypes[m.type] || new Set();
                    const isExpanded = expandedEditMeal === m.type;
                    return (
                      <div key={m.id} className={`rounded-md transition-all ${isExpanded ? 'bg-white dark:bg-dark-elevated border border-brand/30' : 'bg-white/60 dark:bg-dark-elevated/40'}`}>
                        <div className="flex items-center gap-2 px-2.5 py-2">
                          <span className="text-[11px] font-semibold text-ink-900 dark:text-dark-text shrink-0 min-w-[100px]">
                            {m.type}
                          </span>
                          <div className="flex-1 min-w-0">
                            {active.size > 0 ? (
                              <div className="flex flex-wrap gap-1">
                                {Array.from(active).slice(0, isExpanded ? active.size : 4).map(t => (
                                  <span key={t} className="inline-flex items-center px-1.5 h-5 rounded-full bg-brand-400 dark:bg-brand/20 border border-brand/40 text-brand text-[10px] font-medium">{t}</span>
                                ))}
                                {!isExpanded && active.size > 4 && (
                                  <span className="text-[10px] text-ink-600 dark:text-dark-textMuted self-center">+{active.size - 4}</span>
                                )}
                              </div>
                            ) : (
                              <span className="text-[11px] italic text-ink-600 dark:text-dark-textDim">brak — algorytm dobierze różne typy</span>
                            )}
                          </div>
                          <button
                            onClick={() => setExpandedEditMeal(isExpanded ? null : m.type)}
                            className="text-[11px] font-medium text-brand hover:text-brand-dark transition-colors shrink-0 flex items-center gap-0.5"
                          >
                            {isExpanded ? 'Zwiń' : (active.size > 0 ? 'Edytuj' : '+ Dodaj')}
                            <Icon name={isExpanded ? 'chevU' : 'chevD'} className="w-3 h-3" />
                          </button>
                        </div>
                        {isExpanded && (
                          <div className="px-2.5 pb-2.5 pt-0 border-t border-brand/10 fade-in">
                            <div className="text-[10px] text-ink-600 dark:text-dark-textMuted mb-1.5 mt-2">
                              Wybierz typy które klient lubi na <strong>{m.type.toLowerCase()}</strong> ({MEAL_TYPES_TAXONOMY.length} typów):
                            </div>
                            <div className="flex flex-wrap gap-1">
                              {MEAL_TYPES_TAXONOMY.map(type => {
                                const isOn = active.has(type);
                                return (
                                  <button
                                    key={type}
                                    onClick={() => toggleDishType(m.type, type)}
                                    className={`chip-press inline-flex items-center gap-0.5 px-2 h-6 rounded-full border text-[10px] font-medium transition-all ${
                                      isOn
                                        ? 'bg-brand-400 dark:bg-brand/20 border-brand text-brand'
                                        : 'border-ink-200 dark:border-dark-border text-ink-700 dark:text-dark-textMuted hover:border-brand hover:text-brand'
                                    }`}
                                  >
                                    {isOn && <Icon name="check" className="w-2.5 h-2.5" stroke={2.5} />}
                                    {type}
                                  </button>
                                );
                              })}
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
                <div className="mt-2 pt-2 border-t border-brand/15 flex items-start gap-1.5">
                  <Icon name="info" className="w-3 h-3 text-info mt-0.5 shrink-0" />
                  <div className="text-[10px] text-ink-700 dark:text-dark-textMuted">
                    Algorytm dobierze więcej przepisów z zaznaczonych typów. Zmiany tutaj są <strong>tylko dla tej generacji</strong> — profil klienta zostaje bez zmian.
                  </div>
                </div>
              </div>
            )}

            {/* Skąd brać przepisy */}
            <div>
              <div className="text-[11px] font-semibold text-ink-700 dark:text-dark-textMuted uppercase tracking-wider mb-2">
                Skąd brać przepisy?
              </div>
              <div className="grid grid-cols-3 gap-2">
                {AUTOGEN_SOURCES.map(s => {
                  const isActive = source === s.id;
                  return (

  const [priority, setPriority] = useState(null); // 'accuracy' | 'variety'
  const [advancedOpen, setAdvancedOpen] = useState(false);

  // Advanced settings state
  const [margins, setMargins] = useState({ kcal: 10, protein: 10, fat: 10, carbs: 10 });
  const [weights, setWeights] = useState({ kcal: 25, protein: 25, fat: 25, carbs: 25 });
  const [enabledMacros, setEnabledMacros] = useState({ kcal: true, protein: true, fat: true, carbs: true });

  const [exclusions, setExclusions] = useState({
    gluten: true,
    gorczyca: true,
    oliwki: true,
    kapary: true,
  });

  const toggleExclusion = (key) => setExclusions(e => ({ ...e, [key]: !e[key] }));
  const activeExclusionsCount = Object.values(exclusions).filter(Boolean).length;

  // Calculate matching recipes based on settings
  const baseRecipes = 347;
  const avgMargin = (margins.kcal + margins.protein + margins.fat + margins.carbs) / 4;
  const matchingRecipes = Math.max(12, Math.round(baseRecipes * Math.min(1, avgMargin / 15) * (priority === 'accuracy' ? 0.6 : 1) - activeExclusionsCount * 8));

  const equalizeWeights = () => {
    setWeights({ kcal: 25, protein: 25, fat: 25, carbs: 25 });

                        className="h-7 px-2.5 rounded-sm bg-ink-200 dark:bg-dark-elevated hover:bg-ink-200 dark:hover:bg-dark-elevated/70 text-[11px] font-medium text-ink-800 dark:text-dark-text flex items-center gap-1">

                      </button>
                    </div>

                    <div className="bg-ink-200/30 dark:bg-dark-elevated/30 rounded-sm p-3 space-y-2">
                      {macroMeta.map(m => {
                        const weight = weights[m.key];
                        const isMax = m.key === maxWeightKey && weight > 0;
                        return (
                          <div key={m.key} className="flex items-center gap-3">
                            <div className="flex items-center gap-2 w-32 shrink-0">
                              <div className="w-2 h-2 rounded-full" style={{ background: m.color }}></div>
                              <span className="text-xs text-ink-900 dark:text-dark-text">{m.name}</span>

                                style={{ background: m.color, width: `${weight}%`, opacity: isMax ? 1 : 0.55 }}></div>
                              <input type="range" min="0" max="100" value={weight}
                                onChange={e => {
                                  const newVal = Number(e.target.value);
                                  const oldVal = weights[m.key];
                                  const diff = newVal - oldVal;
                                  const otherKeys = Object.keys(weights).filter(k => k !== m.key);
                                  const totalOther = otherKeys.reduce((a, k) => a + weights[k], 0);
                                  const newWeights = { ...weights, [m.key]: newVal };
                                  if (totalOther > 0 && diff !== 0) {
                                    otherKeys.forEach(k => {
                                      newWeights[k] = Math.max(0, Math.round(weights[k] - (diff * weights[k] / totalOther)));
                                    });
                                    // normalize
                                    const total = Object.values(newWeights).reduce((a,b) => a + b, 0);
                                    if (total !== 100 && total > 0) {
                                      const scale = 100 / total;
                                      Object.keys(newWeights).forEach(k => {
                                        if (k !== m.key) newWeights[k] = Math.round(newWeights[k] * scale);
                                      });
                                    }
                                  }
                                  setWeights(newWeights);
                                }}

                            </div>

                        );

                    </div>
                  </div>
                </div>

      {/* Backdrop — bez click outside */}
      <div className="absolute inset-0 bg-deepviolet/40 backdrop-in"></div>

      {/* Panel */}
      <div className="relative w-full sm:w-[640px] h-full bg-white dark:bg-dark-surface shadow-e4 flex flex-col slide-in-r">
        {/* Header */}
        <div className="px-5 py-4 border-b border-ink-200 dark:border-dark-border flex items-center justify-between gap-3 shrink-0">
          <h2 className="text-[16px] font-semibold text-ink-900 dark:text-dark-text">Dodaj {mealName}</h2>
          <button onClick={onClose} className="w-8 h-8 rounded-md hover:bg-ink-200 dark:hover:bg-dark-elevated flex items-center justify-center text-ink-700 dark:text-dark-textMuted btn-press">
            <Icon name="x" className="w-4 h-4" />
          </button>
        </div>

        {/* Tabs */}
        <div className="px-5 pt-3 border-b border-ink-200 dark:border-dark-border shrink-0">
          <div className="flex items-center gap-1">
            {[
              { id: 'collections', label: 'Kolekcje' },
              { id: 'recipes',     label: 'Przepisy' },
              { id: 'products',    label: 'Produkty' },
            ].map(t => {
              const isActive = tab === t.id;
              return (
                <button
                  key={t.id}
                  onClick={() => setTab(t.id)}
                  className={`px-3 h-8 rounded-t-md text-[12px] font-medium transition-all ${
                    isActive
                      ? 'bg-brand-400/40 dark:bg-brand/15 text-brand'
                      : 'text-ink-700 dark:text-dark-textMuted hover:text-ink-900 dark:hover:text-dark-text'
                  }`}
                >
                  {t.label} <span className={isActive ? 'text-brand' : 'text-ink-600 dark:text-dark-textDim'}>({tabCounts[t.id]})</span>

              );
            })}
          </div>
        </div>

        {/* Search + filters */}
        <div className="px-5 pt-3 pb-2 shrink-0">
          <div className="flex items-center gap-2">
            <div className="relative flex-1">
              <Icon name="search" className="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-ink-600 dark:text-dark-textMuted" />

                type="text"
                placeholder="Szukaj"
                value={search}
                onChange={e => setSearch(e.target.value)}

              />
            </div>
            <button
              onClick={() => setFiltersOpen(!filtersOpen)}
              className={`btn-press h-9 px-3 rounded-md border text-[12px] font-medium flex items-center gap-1.5 transition-all ${
                activeFilters.length > 0
                  ? 'border-brand text-brand bg-brand-400/30 dark:bg-brand/10'
                  : 'border-ink-200 dark:border-dark-border text-ink-700 dark:text-dark-textMuted hover:border-brand'
              }`}
            >
              <Icon name="filter" className="w-3.5 h-3.5" stroke={2} />
              Filtry
              {activeFilters.length > 0 && (
                <span className="inline-flex items-center justify-center min-w-[16px] h-4 px-1 rounded-full bg-brand text-white text-[10px] font-semibold">
                  +{activeFilters.length}

              )}
            </button>
            <button className="text-[12px] font-medium text-brand hover:text-brand-dark transition-colors flex items-center gap-1 whitespace-nowrap">
              <Icon name="plus" className="w-3.5 h-3.5" stroke={2} />

            </button>
          </div>

          {/* Active filters chips */}
          {activeFilters.length > 0 && (
            <div className="flex items-center gap-2 mt-3 flex-wrap">
              <span className="text-[11px] text-ink-700 dark:text-dark-textMuted">Zastosowane filtry:</span>

                <button
                  key={f}
                  onClick={() => removeFilter(f)}
                  className="inline-flex items-center gap-1 px-2 h-6 rounded-full bg-brand-400/30 dark:bg-brand/10 border border-brand/20 text-[11px] font-medium text-brand hover:bg-brand-400/50 dark:hover:bg-brand/15 transition-all"

                  {f} <Icon name="x" className="w-2.5 h-2.5" stroke={2.5} />
                </button>
              ))}
              <button
                onClick={() => setActiveFilters([])}
                className="text-[11px] text-ink-700 dark:text-dark-textMuted hover:text-brand font-medium transition-colors"
