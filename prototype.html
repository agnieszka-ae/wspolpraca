};

// CLIENT PREFERENCES BUTTON — icon in program header, opens popover with all prefs
// ============================================================
const ClientPreferencesButton = ({ preferences, clientName = 'Karolina', onEditProfile }) => {
  const [popoverOpen, setPopoverOpen] = useState(false);

  if (!preferences) return null;

  const {
    allergens = [],
    diet,
    dislikedCategories = [],
    dislikedProducts = [],
    favoriteCategories = [],
    favoriteProducts = [],
  } = preferences;

  const hasAllergens = allergens.length > 0;
  const totalCount =
    allergens.length +
    (diet ? 1 : 0) +
    dislikedCategories.length +
    dislikedProducts.length +
    favoriteCategories.length +
    favoriteProducts.length;

  if (totalCount === 0) return null;

  return (
    <div className="relative">
      <button
        onClick={() => setPopoverOpen(!popoverOpen)}
        className={`btn-press w-8 h-8 rounded-md hover:bg-ink-200 dark:hover:bg-dark-elevated flex items-center justify-center text-ink-700 dark:text-dark-textMuted transition-colors relative ${popoverOpen ? 'bg-ink-200 dark:bg-dark-elevated' : ''}`}
        title={`Preferencje żywieniowe klienta${hasAllergens ? ' (zawiera alergeny)' : ''}`}
        aria-label="Preferencje żywieniowe klienta"
      >
        <Icon name="users" className="w-4 h-4" stroke={1.75} />
        {/* Red dot indicator if allergens present */}
        {hasAllergens && (

                  <button onClick={() => { setMessageOpen(false); setMessage(''); }} className="text-[11px] text-ink-600 dark:text-dark-textMuted hover:text-ink-900 dark:hover:text-dark-text">Usuń</button>
                </div>
                <textarea
                  value={message}
                  onChange={e => setMessage(e.target.value.slice(0, MAX_MSG))}
                  rows={3}
                  placeholder="np. Cześć! Twój nowy program jest gotowy. Zaczynamy 26 stycznia 💪"
                  className="w-full px-3 py-2 rounded-md border border-ink-300 dark:border-dark-border bg-white dark:bg-dark-elevated text-[13px] text-ink-900 dark:text-dark-text placeholder-ink-500 focus:border-brand focus:shadow-focus-brand outline-none transition-all resize-none"
                />
                <div className="flex items-center justify-between">
                  <p className="text-[11px] text-ink-600 dark:text-dark-textMuted">
                    Klient otrzyma jako powiadomienie push, gdy program zostanie udostępniony.
                  </p>
                  <span className={`text-[11px] font-medium tabular-nums ${message.length >= MAX_MSG ? 'text-warning' : 'text-ink-600 dark:text-dark-textMuted'}`}>
                    {message.length}/{MAX_MSG}
                  </span>
                </div>
              </div>
            )}
          </div>
        </div>

        {/* Footer */}
        <div className="flex items-center justify-end gap-2 px-5 py-3 border-t border-ink-200 dark:border-dark-border bg-ink-100 dark:bg-dark-bg/50">
          <button
            onClick={onClose}
            className="px-4 h-9 rounded-md border border-ink-200 dark:border-dark-border bg-white dark:bg-dark-surface hover:border-brand text-[13px] font-medium text-ink-800 dark:text-dark-text transition-all"
          >
            Anuluj
          </button>
          <button
            onClick={submit}
            disabled={!name.trim()}
            className="btn-primary btn-press px-4 h-9 rounded-md text-white font-medium text-[13px] disabled:opacity-50 disabled:cursor-not-allowed transition-all"
          >
            Utwórz program
          </button>
        </div>
      </div>
    </div>
  );
};

// DAY TYPES MANAGER MODAL — pełna biblioteka typów dni w programie

const DayTypesManagerModal = ({ activeDayTypes, unusedDayTypes, onClose, onSave }) => {
  // Local state — copy of active IDs (allows checkbox toggles before save)
  const [activeIds, setActiveIds] = useState(new Set(activeDayTypes.map(dt => dt.id)));
  const [selectedId, setSelectedId] = useState(activeDayTypes[0]?.id || unusedDayTypes[0]?.id);

  const allTypes = [...activeDayTypes, ...unusedDayTypes];
  const selected = allTypes.find(dt => dt.id === selectedId);

  const toggleActive = (id) => {
    setActiveIds(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
    // Gdy aktywujemy nieużywany typ dnia, automatycznie go selectujemy
    // aby prawa strona pokazała jego szczegóły (skok do góry + podgląd)
    setSelectedId(id);
  };

  // Mock: compute "realized" values from recipes in dayType bags
  // In real app would be avg from recipes assigned to dayType
  const realizeTypeData = (dt) => {
    // Fake: if dt.kcal === 2000, "realized" is 1500 (missing 500)
    // If 1800, realized 1800 (spot on)
    // If 1600, realized is 1700 (overshoot 100)
    const seed = (dt.kcal || 2000) / 200;
    const realizedKcal = Math.round(dt.kcal * (0.75 + (seed % 1) * 0.3));
    const realizedProtein = Math.round((dt.protein || 100) * 0.4);
    const realizedFat = Math.round((dt.fat || 70) * (1 + (seed % 1) * 0.5));
    const realizedCarbs = Math.round((dt.carbs || 240) * 0.75);
    return { realizedKcal, realizedProtein, realizedFat, realizedCarbs };
  };

  const formatDelta = (realized, target, unit, label) => {
    const diff = realized - target;
    if (Math.abs(diff) < target * 0.03) return { text: 'Brawo! Norma spełniona', color: 'text-success-dark dark:text-success-bright' };
    if (diff < 0) return { text: `Pozostało — ${Math.abs(diff)} ${unit}`, color: 'text-ink-700 dark:text-dark-textMuted' };
    return { text: `Przekroczono o — ${diff} ${unit}`, color: 'text-error-dark dark:text-error-bright' };
  };

  const macros = selected ? [
    { key: 'kcal', label: 'Energetyczność', color: '#E5A117', bg: 'bg-warning', realized: realizeTypeData(selected).realizedKcal, target: selected.kcal, unit: 'kcal' },
    { key: 'B',    label: 'Białko',         color: '#D44450', bg: 'bg-error', realized: realizeTypeData(selected).realizedProtein, target: selected.protein || 100, unit: 'g', letter: 'B' },
    { key: 'T',    label: 'Tłuszcze',       color: '#5252E5', bg: 'bg-info', realized: realizeTypeData(selected).realizedFat, target: selected.fat || 70, unit: 'g', letter: 'T' },
    { key: 'W',    label: 'Węglowodany',    color: '#3AB795', bg: 'bg-success', realized: realizeTypeData(selected).realizedCarbs, target: selected.carbs || 240, unit: 'g', letter: 'W' },
  ] : [];

  const hasRecipes = selected && activeIds.has(selected.id); // mock: active types have recipes

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-6">
      <div className="absolute inset-0 bg-deepviolet/50 backdrop-in"></div>
      <div className="relative bg-white dark:bg-dark-surface rounded-lg shadow-e4 max-w-[1040px] w-full max-h-[92vh] overflow-hidden modal-in flex flex-col">
        {/* Header */}
        <div className="px-6 py-4 border-b border-ink-200 dark:border-dark-border flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-md bg-gradient-brand text-white flex items-center justify-center shadow-brand-sm">
              <Icon name="calendar" className="w-4 h-4" stroke={2} />
            </div>
            <div>
              <h3 className="text-[15px] font-semibold text-ink-900 dark:text-dark-text">Zarządzaj typami dni</h3>
              <p className="text-[12px] text-ink-700 dark:text-dark-textMuted">Zaznacz/odznacz typy dni aby zarządzać programem żywieniowym</p>
            </div>
          </div>
          <button onClick={onClose} className="w-8 h-8 rounded-md hover:bg-ink-200 dark:hover:bg-dark-elevated flex items-center justify-center text-ink-700 dark:text-dark-textMuted btn-press">
            <Icon name="x" className="w-4 h-4" />
          </button>
        </div>

        <div className="flex flex-1 overflow-hidden">
          {/* Left: Day types list */}
          <div className="w-[360px] border-r border-ink-200 dark:border-dark-border flex flex-col shrink-0 bg-ink-200/20 dark:bg-dark-elevated/20">
            <div className="flex-1 overflow-y-auto p-4 space-y-4">
              {/* Active section */}
              <div>
                <div className="text-[11px] font-semibold text-ink-700 dark:text-dark-textMuted mb-2">Dni aktywne w programie:</div>
                <div className="space-y-1.5">
                  {allTypes.filter(dt => activeIds.has(dt.id)).map(dt => {
                    const isActive = true;

                    return (
                      <button key={dt.id} onClick={() => setSelectedId(dt.id)}
                        className={`day-type-item w-full text-left rounded-md p-2.5 border transition-all duration-300 ${

const MEAL_TYPE_OPTIONS = ['Śniadanie', 'II Śniadanie', 'Przekąska', 'Obiad', 'Podwieczorek', 'Kolacja', 'Przed treningiem', 'Po treningu'];

const EditableMealsSection = ({ dayType, macroValues, showMacros, onToggleMacros }) => {
  // Local state — w prawdziwej app propagowane przez onUpdate
  const [meals, setMeals] = useState(dayType.meals);
  const [openTypeDropdown, setOpenTypeDropdown] = useState(null); // mealId of open dropdown

  // Reset meals when dayType changes
  React.useEffect(() => {
    setMeals(dayType.meals);
  }, [dayType.id]);

  // Totals
  const totalPct = meals.reduce((sum, m) => sum + (Number(m.pct) || 0), 0);
  const totalKcal = meals.reduce((sum, m) => sum + (Number(m.kcal) || 0), 0);
  const totalProtein = meals.reduce((sum, m) => sum + Math.round((macroValues.protein * (Number(m.pct) || 0)) / 100), 0);
  const totalFat = meals.reduce((sum, m) => sum + Math.round((macroValues.fat * (Number(m.pct) || 0)) / 100), 0);
  const totalCarbs = meals.reduce((sum, m) => sum + Math.round((macroValues.carbs * (Number(m.pct) || 0)) / 100), 0);

  const pctRounded = Math.round(totalPct * 10) / 10;
  const isPctBalanced = Math.abs(totalPct - 100) < 0.5;
  const pctState = isPctBalanced ? 'ok' : totalPct > 100 ? 'over' : 'under';

  // Edit handlers
  const updateMeal = (id, patch) => {
    setMeals(ms => ms.map(m => m.id === id ? { ...m, ...patch } : m));
  };

  const updatePct = (id, newPct) => {
    const pct = Math.max(0, Math.min(100, Number(newPct) || 0));
    const newKcal = Math.round((macroValues.kcal * pct) / 100);
    updateMeal(id, { pct, kcal: newKcal });
  };

  const updateKcal = (id, newKcal) => {
    const kcal = Math.max(0, Number(newKcal) || 0);
    const pct = Math.round((kcal / macroValues.kcal) * 1000) / 10;
    updateMeal(id, { kcal, pct });
  };

  const addMeal = () => {
    const newId = `m${Date.now()}`;
    const defaultPct = 0;
    setMeals(ms => [...ms, {
      id: newId,
      type: 'Przekąska',
      time: '16:00',
      pct: defaultPct,
      kcal: 0,
    }]);
  };

  const deleteMeal = (id) => {
    setMeals(ms => ms.filter(m => m.id !== id));
  };

  // Grid template — time, energy, %, (B, T, W), delete
  const gridCols = showMacros
    ? 'grid-cols-[1.4fr_0.85fr_0.85fr_0.7fr_0.6fr_0.6fr_0.7fr_36px]'
    : 'grid-cols-[1.6fr_0.95fr_0.95fr_0.8fr_36px]';

  return (
    <div className="bg-white dark:bg-dark-surface border border-ink-200 dark:border-dark-border rounded-lg p-5 shadow-e1">
      {/* Section header */}
      <div className="flex items-center justify-between mb-4">
        <h4 className="text-[11px] font-semibold text-ink-700 dark:text-dark-textMuted uppercase tracking-wider">

      <div className={`grid gap-2 text-[10px] font-semibold text-ink-600 dark:text-dark-textMuted uppercase tracking-wider px-2 pb-2 ${gridCols}`}>
        <div>Typ posiłku</div>
        <div>Godzina</div>
        <div>Energetyczność</div>
        <div>Udział %</div>
        {showMacros && (
          <>
            <div>Białko</div>
            <div>Tłuszcze</div>
            <div>Węglowodany</div>
          </>

        <div></div>

      {/* Meal rows */}
      <div className="space-y-1.5">
        {meals.map((m) => {
          const protein = Math.round((macroValues.protein * (Number(m.pct) || 0)) / 100);
          const fat = Math.round((macroValues.fat * (Number(m.pct) || 0)) / 100);
          const carbs = Math.round((macroValues.carbs * (Number(m.pct) || 0)) / 100);

          return (
            <div
              key={m.id}
              className={`grid gap-2 items-center border border-ink-200 dark:border-dark-border rounded-md px-2 py-1.5 hover:border-brand-300 dark:hover:border-brand/40 hover:shadow-e1 transition-all ${gridCols}`}
            >
              {/* Meal type — dropdown */}
              <div className="relative">
                <button
                  onClick={() => setOpenTypeDropdown(openTypeDropdown === m.id ? null : m.id)}
                  className="w-full h-8 px-2.5 rounded border border-transparent hover:border-ink-200 dark:hover:border-dark-border focus:border-brand focus:shadow-focus-brand outline-none bg-transparent text-[13px] font-medium text-ink-900 dark:text-dark-text flex items-center justify-between gap-1 transition-all"
                >
                  <span className="truncate">{m.type}</span>
                  <Icon name="chevD" className="w-3.5 h-3.5 text-ink-600 dark:text-dark-textMuted shrink-0" />
                </button>
                {openTypeDropdown === m.id && (
                  <>
                    <div className="fixed inset-0 z-30" onClick={() => setOpenTypeDropdown(null)}></div>
                    <div className="absolute top-full left-0 right-0 mt-1 z-40 bg-white dark:bg-dark-elevated border border-ink-200 dark:border-dark-border rounded-md shadow-e3 py-1 min-w-[160px] fade-in">
                      {MEAL_TYPE_OPTIONS.map(opt => (
                        <button
                          key={opt}
                          onClick={() => { updateMeal(m.id, { type: opt }); setOpenTypeDropdown(null); }}
                          className={`w-full px-3 py-1.5 text-left text-[12px] hover:bg-ink-200 dark:hover:bg-dark-surface transition-colors ${
                            m.type === opt
                              ? 'text-brand font-medium bg-brand-400/30 dark:bg-brand/10'
                              : 'text-ink-800 dark:text-dark-text'
                          }`}
                        >
                          {opt}
                        </button>
                      ))}
                    </div>
                  </>
                )}
              </div>

              {/* Time */}
              <div className="relative">
                <Icon name="clock" className="absolute left-2 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-ink-600 dark:text-dark-textMuted pointer-events-none" />
                <input
                  type="time"
                  value={m.time}
                  onChange={e => updateMeal(m.id, { time: e.target.value })}
                  className="w-full h-8 pl-7 pr-1 rounded border border-transparent hover:border-ink-200 dark:hover:border-dark-border focus:border-brand focus:shadow-focus-brand outline-none bg-transparent text-[13px] text-ink-900 dark:text-dark-text tabular-nums transition-all"
                />
              </div>

              {/* Kcal */}
              <div className="relative">
                <input
                  type="number"
                  value={m.kcal}
                  onChange={e => updateKcal(m.id, e.target.value)}
                  className="w-full h-8 pl-2 pr-10 rounded border border-transparent hover:border-ink-200 dark:hover:border-dark-border focus:border-brand focus:shadow-focus-brand outline-none bg-transparent text-[13px] font-medium text-ink-900 dark:text-dark-text tabular-nums transition-all"
                  min="0"
                />
                <span className="absolute right-2 top-1/2 -translate-y-1/2 text-[10px] text-ink-600 dark:text-dark-textMuted pointer-events-none">kcal</span>
              </div>

              {/* Pct */}
              <div className="relative">
                <input
                  type="number"
                  value={m.pct}
                  onChange={e => updatePct(m.id, e.target.value)}
                  className="w-full h-8 pl-2 pr-5 rounded border border-transparent hover:border-ink-200 dark:hover:border-dark-border focus:border-brand focus:shadow-focus-brand outline-none bg-transparent text-[13px] text-ink-900 dark:text-dark-text tabular-nums transition-all"
                  step="0.5"
                  min="0"
                  max="100"
                />
                <span className="absolute right-2 top-1/2 -translate-y-1/2 text-[10px] text-ink-600 dark:text-dark-textMuted pointer-events-none">%</span>
              </div>

              {/* Macros (calculated from pct) */}
              {showMacros && (
                <>
                  <div className="text-[13px] text-ink-900 dark:text-dark-text tabular-nums px-2">
                    {protein}<span className="text-[10px] text-ink-600 dark:text-dark-textMuted ml-0.5">g</span>
                  </div>
                  <div className="text-[13px] text-ink-900 dark:text-dark-text tabular-nums px-2">
                    {fat}<span className="text-[10px] text-ink-600 dark:text-dark-textMuted ml-0.5">g</span>
                  </div>
                  <div className="text-[13px] text-ink-900 dark:text-dark-text tabular-nums px-2">
                    {carbs}<span className="text-[10px] text-ink-600 dark:text-dark-textMuted ml-0.5">g</span>
                  </div>
                </>
              )}

              {/* Delete */}
              <button
                onClick={() => deleteMeal(m.id)}
                className="w-8 h-8 rounded hover:bg-error-light dark:hover:bg-error/10 hover:text-error-dark flex items-center justify-center text-ink-600 dark:text-dark-textMuted btn-press transition-colors"
                aria-label="Usuń posiłek"
              >
                <Icon name="trash" className="w-3.5 h-3.5" />
              </button>
            </div>
          );
        })}
      </div>

      {/* RAZEM row */}
      <div className={`grid gap-2 items-center mt-2 px-2 py-2.5 rounded-md border ${
        pctState === 'ok'
          ? 'bg-success-light dark:bg-success/10 border-success/30'
          : pctState === 'over'
            ? 'bg-error-light dark:bg-error/10 border-error/30'
            : 'bg-warning-light dark:bg-warning/10 border-warning/30'
      } ${gridCols}`}>
        <div className={`text-[12px] font-semibold uppercase tracking-wider ${
          pctState === 'ok' ? 'text-success-dark dark:text-success-bright'
            : pctState === 'over' ? 'text-error-dark dark:text-error-bright'
            : 'text-warning-dark dark:text-warning-bright'
        }`}>
          RAZEM
        </div>
        <div></div>
        <div className={`text-[13px] font-semibold tabular-nums px-2 ${
          pctState === 'ok' ? 'text-success-dark dark:text-success-bright'
            : pctState === 'over' ? 'text-error-dark dark:text-error-bright'
            : 'text-warning-dark dark:text-warning-bright'
        }`}>
          {totalKcal} <span className="text-[10px] font-normal">kcal</span>
        </div>
        <div className={`text-[13px] font-semibold flex items-center gap-1 tabular-nums px-2 ${
          pctState === 'ok' ? 'text-success-dark dark:text-success-bright'
            : pctState === 'over' ? 'text-error-dark dark:text-error-bright'
            : 'text-warning-dark dark:text-warning-bright'
        }`}>
          {pctRounded}<span className="text-[10px] font-normal">%</span>
          {pctState === 'ok' && <Icon name="check" className="w-3.5 h-3.5 ml-0.5" stroke={3} />}
          {pctState === 'over' && <Icon name="warning" className="w-3.5 h-3.5 ml-0.5" />}
          {pctState === 'under' && <Icon name="warning" className="w-3.5 h-3.5 ml-0.5" />}
        </div>
        {showMacros && (
          <>
            <div className="text-[13px] font-semibold text-ink-900 dark:text-dark-text tabular-nums px-2">
              {totalProtein}<span className="text-[10px] font-normal text-ink-600 dark:text-dark-textMuted ml-0.5">g</span>
            </div>
            <div className="text-[13px] font-semibold text-ink-900 dark:text-dark-text tabular-nums px-2">
              {totalFat}<span className="text-[10px] font-normal text-ink-600 dark:text-dark-textMuted ml-0.5">g</span>
            </div>
            <div className="text-[13px] font-semibold text-ink-900 dark:text-dark-text tabular-nums px-2">
              {totalCarbs}<span className="text-[10px] font-normal text-ink-600 dark:text-dark-textMuted ml-0.5">g</span>
            </div>
          </>
        )}
        <div></div>
      </div>

      {/* Helper hint — shown when not balanced */}
      {!isPctBalanced && (
        <div className="mt-2 flex items-center gap-1.5 text-[11px]">
          <Icon name="info" className={`w-3.5 h-3.5 ${pctState === 'over' ? 'text-error-dark' : 'text-warning-dark'}`} />
          <span className={pctState === 'over' ? 'text-error-dark dark:text-error-bright' : 'text-warning-dark dark:text-warning-bright'}>
            {pctState === 'over'
              ? `Udział przekracza 100% — zmniejsz o ${pctRounded - 100}%`
              : `Udział wynosi ${pctRounded}% — dodaj ${Math.round((100 - pctRounded) * 10) / 10}% do któregoś z posiłków`
            }
          </span>
        </div>
      )}

      {/* Add meal */}
      <button
        onClick={addMeal}
        className="mt-3 text-[13px] text-brand font-semibold flex items-center gap-1 hover:text-brand-dark transition-colors"
      >
        <Icon name="plus" className="w-4 h-4" stroke={2.5} /> Dodaj posiłek
      </button>
    </div>
  );
};

// Day type editor — sections for assumptions & meals
const DayTypeEditor = ({ dayType, onUpdate, mode = 'full', showMacros = false, onToggleMacros }) => {
  const maxKcal = 4000;

  // Local macro state — in real app would sync to parent via onUpdate
  const [macroValues, setMacroValues] = useState({
    kcal: dayType.kcal || 2000,
    protein: dayType.protein || 100,
    fat: dayType.fat || 70,
    carbs: dayType.carbs || 240,
  });
  const [balanceModalOpen, setBalanceModalOpen] = useState(false);
  const [balanceTarget, setBalanceTarget] = useState('carbs'); // which macro should absorb the difference
  const [unitMode, setUnitMode] = useState('g'); // 'g' | 'gkg' | 'pct'
  const bodyWeight = 72; // kg — in production pulled from client profile (Karolina)

  // Sum check — each gram of macro = X kcal (B: 4, T: 9, W: 4)
  const computedKcal = (macroValues.protein * 4) + (macroValues.fat * 9) + (macroValues.carbs * 4);
  const kcalDiff = macroValues.kcal - computedKcal;
  const percentSum = Math.round((computedKcal / macroValues.kcal) * 1000) / 10; // 1 decimal
  const isBalanced = Math.abs(kcalDiff) < 10; // within 10 kcal tolerance

  // Balance preview — user chooses which macro to adjust
  const balancePreview = React.useMemo(() => {
    if (isBalanced) return null;

    // kcal per gram for each macro
    const kcalPerGram = { protein: 4, fat: 9, carbs: 4 };

    // Default structure with kcal field
    const result = {
      kcal:    { old: macroValues.kcal, new: macroValues.kcal, delta: 0 },
      protein: { old: macroValues.protein, new: macroValues.protein, delta: 0 },
      fat:     { old: macroValues.fat, new: macroValues.fat, delta: 0 },
      carbs:   { old: macroValues.carbs, new: macroValues.carbs, delta: 0 },
    };

    if (balanceTarget === 'kcal') {
      // Adjust kcal to match the computed kcal from existing macros
      // i.e. kcal = protein*4 + fat*9 + carbs*4
      result.kcal = { old: macroValues.kcal, new: computedKcal, delta: computedKcal - macroValues.kcal };
      return result;
    }

    if (balanceTarget === 'proportional') {
      // Distribute proportionally across all 3 macros
      const proteinShare = (macroValues.protein * 4) / computedKcal;
      const fatShare = (macroValues.fat * 9) / computedKcal;
      const carbShare = (macroValues.carbs * 4) / computedKcal;
      const newProtein = Math.max(0, Math.round(macroValues.protein + (kcalDiff * proteinShare) / 4));
      const newFat = Math.max(0, Math.round(macroValues.fat + (kcalDiff * fatShare) / 9));
      const newCarbs = Math.max(0, Math.round(macroValues.carbs + (kcalDiff * carbShare) / 4));
      result.protein = { old: macroValues.protein, new: newProtein, delta: newProtein - macroValues.protein };
      result.fat = { old: macroValues.fat, new: newFat, delta: newFat - macroValues.fat };
      result.carbs = { old: macroValues.carbs, new: newCarbs, delta: newCarbs - macroValues.carbs };
      return result;
    }

    // Single macro absorbs the difference
    const delta = Math.round(kcalDiff / kcalPerGram[balanceTarget]);
    const newValue = Math.max(0, macroValues[balanceTarget] + delta);
    result[balanceTarget] = { old: macroValues[balanceTarget], new: newValue, delta: newValue - macroValues[balanceTarget] };
    return result;
  }, [macroValues, computedKcal, kcalDiff, isBalanced, balanceTarget]);

  const applyBalance = () => {
    setMacroValues(v => ({
      ...v,
      kcal: balancePreview.kcal.new,
      protein: balancePreview.protein.new,
      fat: balancePreview.fat.new,
      carbs: balancePreview.carbs.new,
    }));
    setBalanceModalOpen(false);
  };

  // Macro config with live state
  const proteinPct = Math.round((macroValues.protein * 4 / macroValues.kcal) * 100);
  const fatPct = Math.round((macroValues.fat * 9 / macroValues.kcal) * 100);
  const carbsPct = Math.round((macroValues.carbs * 4 / macroValues.kcal) * 100);

  // Unit conversion: internal source of truth is always grams.
  // Display mode converts for input/slider only.
  // kcal per gram: protein=4, fat=9, carbs=4
  const kcalPerGram = { protein: 4, fat: 9, carbs: 4 };

  const toDisplay = (key, grams) => {
    if (key === 'kcal') return grams; // kcal not affected
    if (unitMode === 'g') return grams;
    if (unitMode === 'gkg') return Math.round((grams / bodyWeight) * 10) / 10; // 1 decimal
    if (unitMode === 'pct') return Math.round((grams * kcalPerGram[key] / macroValues.kcal) * 100);
    return grams;
  };

  const fromDisplay = (key, displayVal) => {
    if (key === 'kcal') return Number(displayVal) || 0;
    const v = Number(displayVal) || 0;
    if (unitMode === 'g') return v;
    if (unitMode === 'gkg') return Math.round(v * bodyWeight);
    if (unitMode === 'pct') return Math.round((v / 100) * macroValues.kcal / kcalPerGram[key]);
    return v;
  };

  const displayUnit = (key) => {
    if (key === 'kcal') return 'kcal';
    if (unitMode === 'g') return 'g';
    if (unitMode === 'gkg') return 'g/kg';
    if (unitMode === 'pct') return '%';
  };

  // Sliders need different max/step per unit
  const sliderMax = (key) => {
    if (key === 'kcal') return maxKcal;
    if (unitMode === 'g') return ({ protein: 300, fat: 200, carbs: 500 })[key];
    if (unitMode === 'gkg') return ({ protein: 4, fat: 2.5, carbs: 7 })[key]; // reasonable g/kg ranges
    if (unitMode === 'pct') return 100;
  };
  const sliderStep = (key) => {
    if (key === 'kcal') return 10;
    if (unitMode === 'gkg') return 0.1;
    return 1;
  };

  const macros = [
    { key: 'kcal', label: 'Energetyczność', color: '#E5A117' },
    { key: 'protein', label: 'Białko', pct: proteinPct, color: '#D44450' },
    { key: 'fat', label: 'Tłuszcze', pct: fatPct, color: '#E5A117' },
    { key: 'carbs', label: 'Węglowodany', pct: carbsPct, color: '#3AB795' },
  ];

  const updateMacro = (key, displayVal) => {
    const grams = fromDisplay(key, displayVal);
    setMacroValues(v => ({ ...v, [key]: Math.max(0, grams) }));
  };

  return (
    <div className="space-y-4">
      {/* Header with day type identity */}
      <div className="flex items-center justify-between flex-wrap gap-3">
        <div className="flex items-center gap-3 flex-wrap">
          <div className="flex items-center gap-2 bg-white dark:bg-dark-surface border border-ink-200 dark:border-dark-border rounded-md px-3 py-1.5 shadow-e1">
            <div className="w-2.5 h-2.5 rounded-full" style={{ background: dayType.color }}></div>
            <h3 className="text-[14px] font-semibold text-ink-900 dark:text-dark-text">{dayType.name}</h3>
          </div>
          <div className="flex items-center gap-1">
            {['Pn','Wt','Śr','Cz','Pt','Sb','Nd'].map(d => {
              const isActive = dayType.days.includes(d);
              return (
                <button key={d} className={`w-7 h-7 rounded-md text-[10px] font-semibold transition-all chip-press ${isActive ? 'bg-gradient-brand text-white shadow-brand-sm' : 'bg-white dark:bg-dark-surface border border-ink-200 dark:border-dark-border text-ink-600 dark:text-dark-textMuted hover:border-brand'}`}>
                  {d}
                </button>
              );
            })}
          </div>
        </div>
        <div className="flex items-center gap-1">
          <button className="w-8 h-8 rounded-md hover:bg-ink-200 dark:hover:bg-dark-elevated flex items-center justify-center text-ink-600 dark:text-dark-textMuted btn-press transition-colors" title="Usuń"><Icon name="trash" className="w-4 h-4" /></button>
          <button className="w-8 h-8 rounded-md hover:bg-ink-200 dark:hover:bg-dark-elevated flex items-center justify-center text-ink-600 dark:text-dark-textMuted btn-press transition-colors" title="Duplikuj"><Icon name="copy" className="w-4 h-4" /></button>
          <button className="h-8 px-3 rounded-md bg-white dark:bg-dark-surface border border-ink-200 dark:border-dark-border hover:border-brand hover:text-brand text-xs font-medium text-ink-800 dark:text-dark-text flex items-center gap-1.5 btn-press transition-all">
            <Icon name="swap" className="w-3.5 h-3.5" /> Wybierz z szablonu
          </button>
        </div>
      </div>

      {/* Assumptions section */}
      <div className="bg-white dark:bg-dark-surface border border-ink-200 dark:border-dark-border rounded-lg p-5 shadow-e1">
        <div className="flex items-center justify-between mb-4">
          <h4 className="text-[13px] font-semibold text-ink-900 dark:text-dark-text">Energetyczność i makro</h4>
          <div className="flex items-center gap-0.5 text-xs bg-ink-200 dark:bg-dark-elevated rounded-md p-0.5">
            {[
              { key: 'g',   label: 'Gramy (g)' },
              { key: 'gkg', label: 'g/kg mc' },
              { key: 'pct', label: 'Procenty (%)' },
            ].map(u => {
              const isActive = unitMode === u.key;
              return (
                <button key={u.key} onClick={() => setUnitMode(u.key)}
                  className={`chip-press px-2.5 py-1 rounded-md font-semibold transition-all ${
                    isActive
                      ? 'bg-white dark:bg-dark-surface text-brand shadow-e1'
                      : 'text-ink-700 dark:text-dark-textMuted hover:text-ink-900 dark:hover:text-dark-text'
                  }`}>{u.label}</button>
              );
            })}
          </div>
        </div>

        {/* Balance banner — shown when macro sum doesn't match kcal */}
        {!isBalanced && (
          <div className={`mb-4 rounded-md border p-3 flex items-start gap-3 ${
            kcalDiff > 0
              ? 'bg-warning-light dark:bg-warning/10 border-warning/30'
              : 'bg-error-light dark:bg-error/10 border-error/30'
          }`}>
            <div className={`w-8 h-8 rounded-md flex items-center justify-center shrink-0 ${
              kcalDiff > 0 ? 'bg-warning text-white' : 'bg-error text-white'
            }`}>
              <Icon name={kcalDiff > 0 ? 'info' : 'warning'} className="w-4 h-4" stroke={2} />
            </div>
            <div className="flex-1 min-w-0">
              <div className="text-[12px] font-semibold text-ink-900 dark:text-dark-text mb-0.5">
                {kcalDiff > 0
                  ? `Brakuje ${Math.abs(kcalDiff)} kcal · makro sumuje się do ${percentSum}% energii`
                  : `Przekroczono o ${Math.abs(kcalDiff)} kcal · makro sumuje się do ${percentSum}% energii`}
              </div>
              <div className="text-[11px] text-ink-700 dark:text-dark-textMuted">
                Wybierz, który makroskładnik powinien dopełnić brakujące kalorie.
              </div>
            </div>
            <button onClick={() => setBalanceModalOpen(true)}
              className="btn-press h-8 px-3 rounded-md bg-white dark:bg-dark-surface border border-ink-200 dark:border-dark-border hover:border-brand hover:text-brand text-ink-800 dark:text-dark-text text-[12px] font-semibold flex items-center gap-1.5 transition-all shrink-0 shadow-e1">
              <Icon name="calc" className="w-3.5 h-3.5" stroke={2} /> Dorównaj
            </button>
          </div>
        )}

        {isBalanced && (
          <div className="mb-4 rounded-md bg-success-light dark:bg-success/10 border border-success/20 p-2.5 flex items-center gap-2">
            <div className="w-6 h-6 rounded-full bg-success text-white flex items-center justify-center shrink-0">
              <Icon name="check" className="w-3.5 h-3.5" stroke={3} />
            </div>
            <span className="text-[12px] font-medium text-ink-900 dark:text-dark-text">Makro zbilansowane · 100% energii z {proteinPct}% B / {fatPct}% T / {carbsPct}% W</span>
          </div>
        )}

        {/* Body weight hint — shown only in g/kg mc mode */}
        {unitMode === 'gkg' && (
          <div className="mb-3 text-[11px] text-ink-700 dark:text-dark-textMuted flex items-center gap-1.5">
            <Icon name="info" className="w-3.5 h-3.5 text-info" /> Obliczane wg masy ciała klientki: <strong className="text-ink-900 dark:text-dark-text">{bodyWeight} kg</strong>
          </div>
        )}

        <div className="grid grid-cols-4 gap-5">
          {macros.map(m => {
            const gramsValue = macroValues[m.key];
            const displayVal = toDisplay(m.key, gramsValue);
            const max = sliderMax(m.key);
            const step = sliderStep(m.key);
            const unit = displayUnit(m.key);
            const sliderPct = Math.min(100, (displayVal / max) * 100);
            return (
              <div key={m.key}>
                <div className="flex items-center gap-1.5 mb-2">
                  <div className="w-2 h-2 rounded-full" style={{ background: m.color }}></div>
                  <label className="text-[11px] font-medium text-ink-700 dark:text-dark-textMuted">{m.label}</label>
                </div>
                <div className="relative mb-3">
                  <input type="number" value={displayVal} step={step}
                    onChange={(e) => updateMacro(m.key, e.target.value)}
                    className="w-full h-10 px-3 pr-12 bg-white dark:bg-dark-elevated text-ink-900 dark:text-dark-text border border-ink-200 dark:border-dark-border rounded-md text-[14px] font-semibold focus:outline-none focus:border-brand focus:ring-2 focus:ring-brand/20 transition-all" />
                  <span className="absolute right-3 top-1/2 -translate-y-1/2 text-[11px] text-ink-700 dark:text-dark-textMuted font-medium">{unit}</span>
                </div>

                    <div className="absolute -top-1 bg-gradient-brand text-white text-[10px] font-semibold px-1.5 py-0.5 rounded-md shadow-brand-sm" style={{ left: `${sliderPct}%`, transform: 'translateX(-50%)' }}>

                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Meals section — EDITABLE */}
      {mode === 'full' && (

                    <button key={opt.key} onClick={() => setBalanceTarget(opt.key)}

                  { key: 'kcal',    label: 'Kalorie',      color: '#FAB569', unit: 'kcal' },
                  { key: 'protein', label: 'Białko',       color: '#D44450', unit: 'g' },
                  { key: 'fat',     label: 'Tłuszcze',     color: '#E5A117', unit: 'g' },
                  { key: 'carbs',   label: 'Węglowodany',  color: '#3AB795', unit: 'g' },

                  const changed = p.delta !== 0;
                  return (
                    <div key={row.key} className={`rounded-md p-2.5 border flex items-center gap-3 ${
                      changed ? 'bg-brand-400/40 dark:bg-brand/10 border-brand-300 dark:border-brand/30' : 'bg-ink-200/30 dark:bg-dark-elevated/30 border-ink-200 dark:border-dark-border'
                    }`}>
                      <div className="w-2 h-2 rounded-full shrink-0" style={{ background: row.color }}></div>
                      <span className="text-[12px] font-medium text-ink-900 dark:text-dark-text flex-1">{row.label}</span>
                      <span className="text-[12px] text-ink-700 dark:text-dark-textMuted">{p.old} {row.unit}</span>
                      <Icon name="arrR" className="w-3 h-3 text-ink-500 dark:text-dark-textDim" />

                      {changed && (
                        <span className={`text-[11px] font-semibold shrink-0 w-16 text-right ${p.delta > 0 ? 'text-success-dark dark:text-success-bright' : 'text-error-dark dark:text-error-bright'}`}>
                          {p.delta > 0 ? '+' : ''}{p.delta} {row.unit}
                        </span>
                      )}
                      {!changed && <span className="text-[10px] text-ink-600 dark:text-dark-textMuted shrink-0 w-16 text-right">bez zmian</span>}
                    </div>

                })}

              <div className="p-3 bg-info-light dark:bg-info/10 border border-info/20 rounded-md flex items-start gap-2">

                <div className="text-[11px] text-ink-800 dark:text-dark-text leading-relaxed">

                  {balanceTarget === 'kcal' && <>Zmienią się tylko <strong>kalorie</strong> — dopasują się do istniejących makroskładników. Białko, tłuszcze i węglowodany pozostaną bez zmian.</>}
                  {balanceTarget !== 'proportional' && balanceTarget !== 'kcal' && <>Zmieni się tylko <strong>{balanceTarget === 'protein' ? 'białko' : balanceTarget === 'fat' ? 'tłuszcze' : 'węglowodany'}</strong>. Pozostałe wartości zostaną bez zmian.</>}
                </div>
              </div>
            </div>
            <div className="px-6 py-3 border-t border-ink-200 dark:border-dark-border flex items-center justify-end gap-2 bg-ink-200/30 dark:bg-dark-elevated/30">

                Anuluj
              </button>
              <button onClick={applyBalance} className="btn-press h-9 px-5 rounded-md btn-primary text-white font-medium text-sm flex items-center gap-2">
                Zastosuj dorównanie <Icon name="check" className="w-4 h-4" stroke={2.5} />
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

            <section>

                <div className="flex items-center gap-2">
                  <div className="w-7 h-7 rounded-md bg-brand-400 dark:bg-brand/15 text-brand flex items-center justify-center text-[11px] font-semibold">3</div>
                  <div>
                    <h2 className="text-[14px] font-semibold text-ink-900 dark:text-dark-text">
                      {state.program.hasMultipleDayTypes ? 'Założenia per typ dnia' : 'Założenia'}
                    </h2>
                    {state.program.hasMultipleDayTypes && (
                      <p className="text-[11px] text-ink-700 dark:text-dark-textMuted mt-0.5">Wybierz typ dnia z listy po lewej</p>
                    )}
                  </div>
                </div>
                <button onClick={() => setDayTypesManagerOpen(true)}
                  className="btn-press h-8 px-3 rounded-md bg-white dark:bg-dark-surface border border-ink-200 dark:border-dark-border hover:border-brand hover:text-brand text-ink-800 dark:text-dark-text text-[12px] font-semibold flex items-center gap-1.5 transition-all">
                  <Icon name="settings" className="w-3.5 h-3.5" stroke={2} /> Zarządzaj typami dni
                </button>
              </div>

              {/* Bilans energetyczny banner */}
              <div className="bg-gradient-brand-subtle dark:bg-dark-surfaceTint border border-brand-300 dark:border-brand/30 rounded-md p-3.5 mb-4 flex items-center gap-3 shadow-brand-sm">
                <div className="w-9 h-9 rounded-md bg-white dark:bg-dark-surface text-brand flex items-center justify-center shrink-0 shadow-e1">
                  <Icon name="calc" className="w-4 h-4" stroke={2} />
                </div>
                <div className="flex-1">
                  <div className="text-[13px] font-semibold text-ink-900 dark:text-dark-text">Bilans Karoliny: 2000 kcal · 100 / 70 / 240 g</div>
                  <div className="text-[11px] text-ink-700 dark:text-dark-textMuted mt-0.5">CPM 2100 kcal · cel: redukcja · <span className="font-medium text-brand">wypełnione automatycznie</span></div>
                </div>
                <button className="text-xs text-brand font-semibold hover:underline whitespace-nowrap shrink-0 flex items-center gap-1">
                  Zobacz bilans <Icon name="arrR" className="w-3.5 h-3.5" />
                </button>
              </div>

              {state.program.hasMultipleDayTypes ? (
                <div className="grid grid-cols-[240px_1fr] gap-4">
                  <DayTypesList
                    dayTypes={currentDayTypes}
                    activeId={activeDayTypeId}
                    onSelect={setActiveDayTypeId}
                    onAddDayType={() => setDayTypesManagerOpen(true)}
                    onManage={() => setDayTypesManagerOpen(true)} />
                  <DayTypeEditor
                    dayType={activeDayType}
                    mode={cfg.editorMode === 'full' ? 'full' : 'assumptions-only'}
                    showMacros={showMacrosPerMeal}
                    onToggleMacros={e => setShowMacrosPerMeal(e.target.checked)} />
                </div>
              ) : (
                <DayTypeEditor
                  dayType={activeDayType}
                  mode={cfg.editorMode === 'full' ? 'full' : 'assumptions-only'}
                  showMacros={showMacrosPerMeal}
                  onToggleMacros={e => setShowMacrosPerMeal(e.target.checked)} />
              )}
            </section>

            {/* Bottom tip for assumptions flow */}
            {isShort && (
              <div className="bg-white dark:bg-dark-surface border border-ink-200 dark:border-dark-border rounded-md p-4 flex items-start gap-3">
                <div className="w-8 h-8 rounded-sm bg-success-light dark:bg-success/10 text-success-dark dark:text-success-bright flex items-center justify-center shrink-0">
                  <Icon name="check" className="w-4 h-4" stroke={2.5} />
                </div>
                <div className="flex-1 text-xs">
                  <div className="font-medium text-ink-900 dark:text-dark-text mb-0.5">To wszystko — możesz udostępnić klientowi</div>
                  <div className="text-ink-700 dark:text-dark-textMuted">Klient zobaczy założenia i rozkład posiłków w aplikacji. Posiłki komponuje sam — opcjonalnie dodaj zbiory przepisów, z których może wybierać.</div>
                </div>
              </div>
            )}
          </div>

          {/* RIGHT: sticky summary */}
          <aside>
            <div className="lg:sticky lg:top-20 space-y-3">
              <div className="bg-white dark:bg-dark-surface border border-ink-200 dark:border-dark-border rounded-lg p-5 shadow-e2">
                <div className="flex items-center gap-2 mb-4">
                  <div className="w-1.5 h-1.5 rounded-full bg-gradient-brand"></div>
                  <div className="text-[10px] font-semibold text-ink-700 dark:text-dark-textMuted uppercase tracking-[0.08em]">Podsumowanie</div>
                </div>

                <h3 className="text-[15px] font-semibold text-ink-900 dark:text-dark-text mb-4 leading-tight">{state.program.name}</h3>

                <div className="space-y-2.5 pb-4 mb-4 border-b border-ink-200 dark:border-dark-border">
                  <div className="flex items-center gap-2 text-xs">
                    <Icon name="calendar" className="w-3.5 h-3.5 text-ink-600 dark:text-dark-textMuted shrink-0" stroke={2} />
                    <span className="text-ink-800 dark:text-dark-text">{state.program.start} — {state.program.end}</span>
                  </div>
                  <div className="flex items-center gap-2 text-xs">
                    <Icon name="flame" className="w-3.5 h-3.5 text-ink-600 dark:text-dark-textMuted shrink-0" stroke={2} />
                    <span className="text-ink-800 dark:text-dark-text">
                      {state.program.hasMultipleDayTypes
                        ? `${currentDayTypes.length} typy dni · różne kcal`
                        : `${activeDayType.kcal} kcal · ${activeDayType.protein}/${activeDayType.fat}/${activeDayType.carbs} g`}
                    </span>
                  </div>
                  {cfg.editorMode === 'full' && (
                    <div className="flex items-center gap-2 text-xs">
                      <Icon name="clock" className="w-3.5 h-3.5 text-ink-600 dark:text-dark-textMuted shrink-0" stroke={2} />
                      <span className="text-ink-800 dark:text-dark-text">{activeDayType.meals.length} posiłki dziennie</span>
                    </div>
                  )}
                </div>

                <div className="mb-5">
                  <div className="text-[10px] font-semibold text-ink-700 dark:text-dark-textMuted uppercase tracking-[0.08em] mb-2.5">Co otrzyma klient</div>
                  <div className="space-y-2">
                    <div className="flex items-center gap-2 text-xs text-ink-800 dark:text-dark-text">
                      <div className="w-4 h-4 rounded bg-success-light dark:bg-success/10 text-success-dark dark:text-success-bright flex items-center justify-center shrink-0"><Icon name="check" className="w-2.5 h-2.5" stroke={3.5} /></div>
                      Założenia kcal i makro
                    </div>
                    {flow === 'assumptions' && (
                      <>
                        <div className="flex items-center gap-2 text-xs text-ink-800 dark:text-dark-text">
                          <div className="w-4 h-4 rounded bg-success-light dark:bg-success/10 text-success-dark dark:text-success-bright flex items-center justify-center shrink-0"><Icon name="check" className="w-2.5 h-2.5" stroke={3.5} /></div>
                          Rozkład posiłków z godzinami
                        </div>
                        <div className="flex items-center gap-2 text-xs text-ink-700 dark:text-dark-textMuted">
                          <div className="w-4 h-4 rounded bg-ink-200 dark:bg-dark-elevated flex items-center justify-center shrink-0"><Icon name="plus" className="w-2.5 h-2.5" stroke={2.5} /></div>
                          Zbiory przepisów (opcjonalnie)
                        </div>
                      </>
                    )}
                    {(flow === 'mealplan' || flow === 'expert') && (
                      <div className="flex items-center gap-2 text-xs text-ink-700 dark:text-dark-textMuted">
                        <div className="w-4 h-4 rounded bg-brand-400 dark:bg-brand/15 text-brand flex items-center justify-center shrink-0"><Icon name="sparkles" className="w-2.5 h-2.5" /></div>
                        Jadłospis (w kolejnych krokach)
                      </div>
                    )}
                    <div className="flex items-center gap-2 text-xs text-ink-700 dark:text-dark-textMuted">
                      <div className="w-4 h-4 rounded bg-ink-200 dark:bg-dark-elevated flex items-center justify-center shrink-0"><Icon name="plus" className="w-2.5 h-2.5" stroke={2.5} /></div>
                      Materiały edukacyjne
                    </div>
                  </div>
                </div>

                <div className="space-y-2">
                  <button onClick={cfg.primaryAction} className="w-full btn-primary btn-press h-10 rounded-md text-white font-medium text-sm flex items-center justify-center gap-2">
                    {cfg.primaryCta} <Icon name="arrR" className="w-4 h-4" />
                  </button>
                  {cfg.secondaryCta && (
                    <button onClick={cfg.secondaryAction} className="w-full btn-press h-10 rounded-md border border-brand-300 dark:border-brand/30 bg-white dark:bg-dark-surface hover:bg-brand-400 dark:bg-brand/15 text-brand font-medium text-sm transition-all">
                      {cfg.secondaryCta}
                    </button>
                  )}
                </div>
              </div>
            </div>
          </aside>
        </div>
      </div>

      {/* Day types manager modal */}
      {dayTypesManagerOpen && (
        <DayTypesManagerModal
          activeDayTypes={state.program.hasMultipleDayTypes ? state.program.dayTypesMulti : state.program.dayTypes}
          unusedDayTypes={state.program.unusedDayTypes || []}
          onClose={() => setDayTypesManagerOpen(false)}
          onSave={(activeIds) => {
            // Combine all day types from both lists, then split based on activeIds
            const currentActive = state.program.hasMultipleDayTypes ? state.program.dayTypesMulti : state.program.dayTypes;
            const currentUnused = state.program.unusedDayTypes || [];
            const allTypes = [...currentActive, ...currentUnused];

            const newActive = allTypes.filter(dt => activeIds.has(dt.id));
            const newUnused = allTypes.filter(dt => !activeIds.has(dt.id));

            // If we have more than 1 active type, switch to multi mode
            const shouldUseMulti = newActive.length > 1;

            setState(s => ({
              ...s,
              program: {
                ...s.program,
                hasMultipleDayTypes: shouldUseMulti || s.program.hasMultipleDayTypes,
                // When multi: store in dayTypesMulti
                // When single: store first active in dayTypes
                ...(shouldUseMulti
                  ? { dayTypesMulti: newActive }
                  : newActive.length === 1
                    ? { dayTypes: newActive }
                    : {}), // if 0 active — don't overwrite, would be error state
                unusedDayTypes: newUnused,
              },
            }));

            // Reset active day type selection to first one in new active list
            if (newActive.length > 0) {
              setActiveDayTypeId(newActive[0].id);
            }

            setDayTypesManagerOpen(false);
          }} />
      )}
    </div>
  );
};

// ============================================================
// AUTOGEN ONBOARDING — conversational flow with interactive advanced settings
// ============================================================
// ============================================================
// AUTOGEN RECIPES MODAL — 3-warstwowy, prosty, z uwzględnieniem preferencji klienta
// Warstwa 1: Z profilu klienta (z Ignoruj)
// Warstwa 2: Założenia automat (read-only)
// Warstwa 3: Opcjonalne preferencje (collapsed)
// ============================================================
const AutogenRecipesModal = ({
  dayType,
  clientPreferences,
  clientName = 'Karolina',
  // Scope — jeden posiłek albo wszystkie posiłki typu dnia
  scope = 'all',              // 'all' | 'single'
  scopeMealType,              // nazwa posiłku jeśli scope === 'single'
  onClose,
  onGenerate,
}) => {
  // Które preferencje z profilu są aktywnie ignorowane jednorazowo
  const [ignoredPrefs, setIgnoredPrefs] = useState(new Set());
  const toggleIgnore = (key) => {
    setIgnoredPrefs(prev => {
      const next = new Set(prev);
      if (next.has(key)) next.delete(key); else next.add(key);
      return next;
    });
  };

  // Liczba przepisów do dobrania
  const [count, setCount] = useState(10);

  // Skąd brać przepisy — Baza / Biblioteka / Mieszanie
  const [source, setSource] = useState('base');

  // Loading state — po CTA pokazujemy 2.4s loading screen z rotującymi komunikatami
  const [generating, setGenerating] = useState(false);
  const [loadingPhase, setLoadingPhase] = useState(0);

  React.useEffect(() => {
    if (!generating) return;
    const timers = [
      setTimeout(() => setLoadingPhase(1), 700),
      setTimeout(() => setLoadingPhase(2), 1400),
      setTimeout(() => setLoadingPhase(3), 2100),
    ];
    return () => timers.forEach(clearTimeout);
  }, [generating]);

  // Meal selector — który posiłek (tylko jeśli scope === 'single')
  const [selectedMeal, setSelectedMeal] = useState(scopeMealType || dayType?.meals?.[0]?.type || 'Śniadanie');
  const selectedMealObj = dayType?.meals?.find(m => m.type === selectedMeal);

  // Ulubione rodzaje potraw per typ posiłku — z profilu klienta (mock)
  // Map: 'Śniadanie' → Set('Owsianka', 'Jaglanka'). Edytowalne per-generacja.
  const [favoriteDishTypes, setFavoriteDishTypes] = useState(() => {
    const initial = {};
    Object.entries(MOCK_FAVORITE_DISH_TYPES).forEach(([meal, types]) => {
      initial[meal] = new Set(types);
    });
    return initial;
  });

  // UI: rozwijana sekcja "edytuj" per posiłek (scope=all)
  const [expandedEditMeal, setExpandedEditMeal] = useState(null);

  const toggleDishType = (mealName, dishType) => {
    setFavoriteDishTypes(prev => {
      const next = { ...prev };
      const set = new Set(next[mealName] || []);
      if (set.has(dishType)) set.delete(dishType); else set.add(dishType);
      next[mealName] = set;
      return next;
    });
  };

  // Wartości odżywcze — defaultowe z założeń programu, edytowalne per-generacja
  // Dla scope=all: z dayType (cały dzień). Dla scope=single: z posiłku.
  const defaultNutrition = scope === 'all' ? {
    kcal: dayType?.kcal || 2000,
    protein: dayType?.protein || 100,
    fat: dayType?.fat || 70,
    carbs: dayType?.carbs || 240,
  } : {
    kcal: selectedMealObj?.kcal || 500,
    // Proporcjonalnie do udziału posiłku
    protein: Math.round(((dayType?.protein || 100) * (selectedMealObj?.pct || 25)) / 100),
    fat: Math.round(((dayType?.fat || 70) * (selectedMealObj?.pct || 25)) / 100),
    carbs: Math.round(((dayType?.carbs || 240) * (selectedMealObj?.pct || 25)) / 100),
  };

  const [nutrition, setNutrition] = useState(defaultNutrition);
  const [tolerance, setTolerance] = useState(10); // ±% single tolerance for all
  const [nutritionExpanded, setNutritionExpanded] = useState(false);
  const [microExpanded, setMicroExpanded] = useState(false);

  // When selectedMeal changes (scope=single), reset nutrition to new defaults
  React.useEffect(() => {
    setNutrition(defaultNutrition);
  }, [selectedMeal, scope]);

  // Mikroelementy — domyślnie wszystkie wyłączone, user wybiera które uwzględnić
  const [microElements, setMicroElements] = useState({
    iron: { enabled: false, min: 8, max: 14, unit: 'mg', label: 'Żelazo' },
    calcium: { enabled: false, min: 800, max: 1200, unit: 'mg', label: 'Wapń' },
    fiber: { enabled: false, min: 20, max: 35, unit: 'g', label: 'Błonnik' },
    vitaminD: { enabled: false, min: 10, max: 20, unit: 'µg', label: 'Witamina D' },
    magnesium: { enabled: false, min: 260, max: 400, unit: 'mg', label: 'Magnez' },
    zinc: { enabled: false, min: 7, max: 12, unit: 'mg', label: 'Cynk' },
  });

  const isNutritionModified =
    nutrition.kcal !== defaultNutrition.kcal ||
    nutrition.protein !== defaultNutrition.protein ||
    nutrition.fat !== defaultNutrition.fat ||
    nutrition.carbs !== defaultNutrition.carbs ||
    tolerance !== 10;

  const enabledMicroCount = Object.values(microElements).filter(m => m.enabled).length;

  const restoreDefaults = () => {
    setNutrition(defaultNutrition);
    setTolerance(10);
    setNutritionUnlocked(false);
  };

  // Read-only mode na start; user musi jawnie odblokować edycję dla tej generacji
  const [nutritionUnlocked, setNutritionUnlocked] = useState(false);

  // Opcjonalne preferencje doboru — Grupa C (rozwijane)
  const [advancedOpen, setAdvancedOpen] = useState(false);

  const [prepTime, setPrepTime] = useState(null);          // 'quick' | 'under30' | '30-60' | 'over1h'
  const [cuisine, setCuisine] = useState([]);              // array of cuisines
  const [season, setSeason] = useState('allyear');

  const {
    allergens = [],
    diet,
    dislikedCategories = [],
    dislikedProducts = [],
  } = clientPreferences || {};

  // Lista preferencji z profilu — render z checkbox-ami ignoruj
  const profilePrefItems = [
    ...(diet ? [{ key: 'diet', label: `Dieta: ${diet}`, icon: 'apple', tone: 'success' }] : []),
    ...allergens.map((a, i) => ({ key: `allergen-${i}`, label: `Wyklucz: ${a}`, icon: 'warning', tone: 'error' })),
    ...dislikedCategories.map((c, i) => ({ key: `dcat-${i}`, label: `Nie lubi: ${c}`, icon: 'dislike', tone: 'warning' })),
    ...dislikedProducts.map((p, i) => ({ key: `dprod-${i}`, label: `Nie lubi: ${p}`, icon: 'dislike', tone: 'warning' })),
  ];

  const toneClasses = {
    error:   { bg: 'bg-error-light dark:bg-error/15',     border: 'border-error/30',   text: 'text-error-dark dark:text-error-bright',     icon: 'text-error-dark dark:text-error-bright' },
    success: { bg: 'bg-success-light dark:bg-success/15', border: 'border-success/30', text: 'text-success-dark dark:text-success-bright', icon: 'text-success-dark dark:text-success-bright' },
    warning: { bg: 'bg-warning-light dark:bg-warning/15', border: 'border-warning/30', text: 'text-warning-dark dark:text-warning-bright', icon: 'text-warning-dark dark:text-warning-bright' },
  };

  // Szacowana liczba pasujących przepisów w bazie — dla feedbacku wizualnego
  const baseMatching = 347;
  const ignoredFactor = 1 + (ignoredPrefs.size * 0.15); // ignorowanie zwiększa pulę
  const prepFactor = prepTime ? 0.6 : 1;
  const estimatedMatching = Math.max(8, Math.round(baseMatching * ignoredFactor * prepFactor / profilePrefItems.length * 1.5));

  return (
    <div
      className="fixed inset-0 z-50 bg-deepviolet/50 dark:bg-black/70 backdrop-in flex items-center justify-center p-4"
    >
      <div
        className="bg-white dark:bg-dark-surface rounded-lg shadow-e4 w-full max-w-[560px] max-h-[90vh] overflow-hidden fade-in flex flex-col"
        onClick={e => e.stopPropagation()}
      >
        {/* Header */}
        <div className="px-5 py-4 flex items-center justify-between border-b border-ink-200 dark:border-dark-border shrink-0">
          <div className="flex items-center gap-3">
            <div className="w-9 h-9 rounded-md bg-gradient-brand text-white flex items-center justify-center shadow-brand-sm">
              <Icon name="sparkles" className="w-4 h-4" stroke={2} />
            </div>
            <div>
              <h3 className="text-[15px] font-semibold text-ink-900 dark:text-dark-text">
                {scope === 'all' ? 'Autogeneruj wszystkie posiłki' : `Autogeneruj dla ${scopeMealType || selectedMeal}`}
              </h3>
              <p className="text-[12px] text-ink-700 dark:text-dark-textMuted mt-0.5">
                Dobierzemy przepisy z bazy pod założenia {dayType?.name || 'dnia'}
              </p>
            </div>
          </div>
          <button onClick={onClose} className="w-8 h-8 rounded-md hover:bg-ink-200 dark:hover:bg-dark-elevated flex items-center justify-center text-ink-700 dark:text-dark-textMuted btn-press">
            <Icon name="x" className="w-4 h-4" />
          </button>
        </div>

        {/* Body — scrollable (lub loading) */}
        {generating ? (
          <div className="flex-1 overflow-hidden flex flex-col items-center justify-center px-8 py-10 text-center fade-in">
            <div className="relative mb-6 w-16 h-16">
              <div className="absolute inset-0 border-4 border-brand-400 dark:border-brand/20 rounded-full"></div>
              <div className="absolute inset-0 border-4 border-brand border-t-transparent rounded-full animate-spin"></div>
              <div className="absolute inset-0 flex items-center justify-center">
                <Icon name="sparkles" className="w-6 h-6 text-brand" />
              </div>
            </div>
            <h2 className="text-[15px] font-semibold text-ink-900 dark:text-dark-text mb-1">
              {scope === 'all' ? `Dobieram przepisy dla ${clientName}` : `Dobieram przepisy na ${(scopeMealType || selectedMeal || '').toLowerCase()}`}
            </h2>
            <p className="text-[12px] text-ink-700 dark:text-dark-textMuted mb-6">
              {scope === 'all' ? `Po ${count} przepisów na każdy posiłek` : `${count} ${count === 1 ? 'przepis' : count < 5 ? 'przepisy' : 'przepisów'}`}
            </p>
            <div className="w-full max-w-[380px] space-y-1.5 text-left">
              {[
                'Przeglądam bazę przepisów',
                ignoredPrefs.size > 0 ? `Sprawdzam preferencje (${profilePrefItems.length - ignoredPrefs.size} z ${profilePrefItems.length} aktywnych)` : 'Sprawdzam preferencje i wykluczenia',
                'Dopasowuję do założeń kcal i makro',
                'Sortuję najlepsze propozycje',
              ].map((label, i) => {
                const done = i < loadingPhase;
                const active = i === loadingPhase;
                return (
                  <div key={i} className={`flex items-center gap-2 px-3 py-2 rounded-sm text-[12px] transition-all ${active ? 'bg-brand-400/40 dark:bg-brand/10' : 'bg-transparent'}`}>
                    {done
                      ? <Icon name="check" className="w-3.5 h-3.5 text-success-dark dark:text-success-bright shrink-0" stroke={3} />
                      : active
                      ? <div className="w-3.5 h-3.5 border-2 border-brand border-t-transparent rounded-full animate-spin shrink-0"></div>
                      : <div className="w-3.5 h-3.5 rounded-full border border-ink-300 dark:border-dark-borderLight shrink-0"></div>
                    }
                    <span className={done ? 'text-ink-600 dark:text-dark-textMuted' : active ? 'text-ink-900 dark:text-dark-text font-medium' : 'text-ink-500 dark:text-dark-textDim'}>{label}</span>
                  </div>
                );
              })}
            </div>
          </div>
        ) : (
        <div className="flex-1 overflow-y-auto px-5 py-4 space-y-5">

          {/* Meal selector (only for single scope) */}
          {scope === 'single' && dayType?.meals && (
            <div>
              <label className="text-[11px] font-semibold text-ink-700 dark:text-dark-textMuted uppercase tracking-wider mb-1.5 block">
                Wybrany posiłek
              </label>
              <div className="relative">
                <select
                  value={selectedMeal}
                  onChange={e => setSelectedMeal(e.target.value)}
                  className="w-full h-10 px-3 pr-9 rounded-md border border-ink-200 dark:border-dark-border bg-white dark:bg-dark-elevated text-[13px] text-ink-900 dark:text-dark-text focus:border-brand focus:ring-2 focus:ring-brand/20 outline-none transition-all appearance-none cursor-pointer"
                >
                  {dayType.meals.map(m => (
                    <option key={m.id} value={m.type}>{m.type}, {m.time} · {m.kcal} kcal</option>
                  ))}
                </select>
                <Icon name="chevD" className="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-ink-600 dark:text-dark-textMuted pointer-events-none" />
              </div>
            </div>
          )}

          {/* Lubi na <posiłek> — sekcja "rodzaj potrawy" wynesiona z opcji zaawansowanych */}
          {scope === 'single' && (() => {
            const active = favoriteDishTypes[selectedMeal] || new Set();
            const fromProfile = new Set(MOCK_FAVORITE_DISH_TYPES[selectedMeal] || []);
            return (
              <div className="rounded-md border border-brand/20 bg-brand-400/30 dark:bg-brand/5 p-3">
                <div className="flex items-center justify-between mb-2">

                          </button>

                      </div>
                    </div>
                  </details>
                </div>
                {/* Info o ignorowanych z profilu (jeśli są) */}
                {Array.from(fromProfile).filter(t => !active.has(t)).length > 0 && (

                    <Icon name="info" className="w-3 h-3 text-info mt-0.5 shrink-0" />

                      {Array.from(fromProfile).filter(t => !active.has(t)).map((t, i, arr) => (
                        <span key={t}>
                          <button
                            onClick={() => toggleDishType(selectedMeal, t)}
                            className="text-brand hover:text-brand-dark font-medium underline"
                          >{t}</button>
                          {i < arr.length - 1 ? ', ' : ''}
                        </span>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            );

          {/* Skąd brać przepisy */}
