              </button>
            </div>
          )}
        </div>

        {/* List */}
        <div className="flex-1 overflow-y-auto px-5 py-2">
          {tab === 'recipes' && (
            <div className="space-y-2">
              {filteredRecipes.map(r => {
                const isSelected = selected.has(r.id);
                return (
                  <button
                    key={r.id}
                    onClick={() => toggleSelect(r.id)}
                    className={`w-full text-left rounded-md border transition-all ${
                      isSelected
                        ? 'border-brand bg-brand-400/20 dark:bg-brand/5'
                        : 'border-ink-200 dark:border-dark-border bg-white dark:bg-dark-elevated hover:border-brand-300 dark:hover:border-brand/40'
                    }`}
                  >
                    <div className="flex items-center gap-3 p-2.5">
                      {/* Checkbox */}
                      <div className={`w-4 h-4 rounded border flex items-center justify-center shrink-0 transition-all ${
                        isSelected
                          ? 'bg-brand border-brand'
                          : 'border-ink-300 dark:border-dark-borderLight bg-white dark:bg-dark-surface'
                      }`}>
                        {isSelected && <Icon name="check" className="w-3 h-3 text-white" stroke={3} />}
                      </div>
                      {/* Image */}
                      <div className={`w-14 h-14 rounded-md bg-gradient-to-br ${r.image} shrink-0`}></div>
                      {/* Content */}
                      <div className="flex-1 min-w-0">
                        <div className="text-[13px] font-semibold text-ink-900 dark:text-dark-text mb-1">{r.name}</div>
                        <div className="flex items-center gap-2 text-[11px] text-ink-700 dark:text-dark-textMuted mb-1.5">
                          <span className="flex items-center gap-1">
                            <Icon name="flame" className="w-3 h-3 text-warning" /> <span className="font-semibold text-ink-900 dark:text-dark-text">{r.kcal} kcal</span>
                            <span>(B: {r.protein}g - T: {r.fat}g - W: {r.carbs}g)</span>
                          </span>
                          <span className="text-ink-300 dark:text-dark-borderLight">·</span>
                          <span className="flex items-center gap-1"><Icon name="clock" className="w-3 h-3" /> {r.time}</span>
                          <span className="text-ink-300 dark:text-dark-borderLight">·</span>
                          <span className="flex items-center gap-1"><Icon name="utensils" className="w-3 h-3" /> {r.difficulty}</span>
                        </div>
                        <div className="flex items-center gap-1 flex-wrap">
                          {r.status.liked && <span className="inline-flex items-center justify-center w-5 h-5 rounded-full bg-success-light dark:bg-success/15"><Icon name="like" className="w-3 h-3 text-success-dark dark:text-success-bright" /></span>}
                          {r.status.disliked && <span className="inline-flex items-center justify-center w-5 h-5 rounded-full bg-warning-light dark:bg-warning/15"><Icon name="dislike" className="w-3 h-3 text-warning-dark dark:text-warning-bright" /></span>}
                          {r.status.blocked && <span className="inline-flex items-center justify-center w-5 h-5 rounded-full bg-error-light dark:bg-error/15"><Icon name="warning" className="w-3 h-3 text-error-dark dark:text-error-bright" /></span>}
                          {r.tags.slice(0, 3).map((t, i) => (
                            <span key={i} className="text-[10px] font-medium text-brand bg-brand-400/40 dark:bg-brand/10 border border-brand/20 px-1.5 py-0.5 rounded">{t}</span>
                          ))}
                          {r.tags.length > 3 && (
                            <span className="text-[10px] text-ink-700 dark:text-dark-textMuted">więcej</span>
                          )}
                        </div>
                      </div>
                      <Icon name="chevR" className="w-4 h-4 text-ink-500 dark:text-dark-textDim shrink-0" stroke={2} />
                    </div>
                  </button>
                );
              })}
            </div>
          )}

          {tab === 'collections' && (
            <div className="text-center py-12 text-[12px] text-ink-700 dark:text-dark-textMuted">
              <Icon name="folder" className="w-10 h-10 mx-auto mb-2 text-ink-400 dark:text-dark-borderLight" stroke={1.5} />
              Wybierz kolekcję przepisów ({tabCounts.collections} dostępnych)
            </div>
          )}

          {tab === 'products' && (
            <div className="text-center py-12 text-[12px] text-ink-700 dark:text-dark-textMuted">
              <Icon name="apple" className="w-10 h-10 mx-auto mb-2 text-ink-400 dark:text-dark-borderLight" stroke={1.5} />
              Lista produktów ({tabCounts.products} pozycji)
            </div>
          )}
        </div>

        {/* Sticky footer */}
        <div className="px-5 py-3 border-t border-ink-200 dark:border-dark-border bg-ink-100 dark:bg-dark-bg/50 flex items-center justify-between gap-2 shrink-0">
          <div className="text-[12px] text-ink-700 dark:text-dark-textMuted">
            Wybrano <span className="font-semibold text-ink-900 dark:text-dark-text">({selected.size} {selected.size === 1 ? 'propozycja' : selected.size > 1 && selected.size < 5 ? 'propozycje' : 'propozycji'})</span>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={onClose} className="btn-press h-9 px-4 rounded-md border border-ink-200 dark:border-dark-border bg-white dark:bg-dark-surface hover:border-ink-400 text-[13px] font-medium text-ink-800 dark:text-dark-text transition-all">
              Anuluj
            </button>
            <button
              onClick={handleAdd}
              disabled={selected.size === 0}
              className={`btn-press h-9 px-5 rounded-md text-white font-medium text-[13px] flex items-center gap-2 ${
                selected.size > 0 ? 'btn-primary' : 'bg-ink-400 dark:bg-dark-borderLight cursor-not-allowed'
              }`}
            >
              Dodaj
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};

// Small helpers
const MacroRing = ({ letter, color }) => (
  <span className="inline-flex w-[18px] h-[18px] rounded-full text-white text-[10px] font-bold items-center justify-center shrink-0" style={{ background: color }}>
    {letter}
  </span>
);

// Status badge — small rounded icon shown inline on recipe cards
const StatusBadge = ({ type }) => {
  const cfg = {
    dislike: { icon: 'dislike', bg: 'bg-warning-light dark:bg-warning/10', color: 'text-warning-dark dark:text-warning-bright', title: 'Klient nie lubi' },
    info:    { icon: 'info',    bg: 'bg-info-light dark:bg-info/10',    color: 'text-info-dark dark:text-info-bright',    title: 'Uwaga / informacja' },
    allergen:{ icon: 'noEnter', bg: 'bg-error-light dark:bg-error/10',   color: 'text-error-dark dark:text-error-bright',   title: 'Zawiera alergen' },
  }[type];
  if (!cfg) return null;
  return (
    <div title={cfg.title} className={`w-6 h-6 rounded-full ${cfg.bg} ${cfg.color} flex items-center justify-center shrink-0`}>
      <Icon name={cfg.icon} className="w-3.5 h-3.5" stroke={2} />
    </div>
  );
};

// Rich recipe card

// Meal accordion row
const MealRow = ({ meal, recipes, products, expanded, onToggle, onRemoveRecipe, onRemoveProduct, onAutogen, onAddManual }) => {
  const totalKcal = recipes.reduce((a, r) => a + r.kcal, 0) + products.reduce((a, p) => a + p.kcal, 0);
  const totalProtein = recipes.reduce((a, r) => a + r.protein, 0) + products.reduce((a, p) => a + p.protein, 0);
  const totalFat = recipes.reduce((a, r) => a + r.fat, 0) + products.reduce((a, p) => a + p.fat, 0);
  const totalCarbs = recipes.reduce((a, r) => a + r.carbs, 0) + products.reduce((a, p) => a + p.carbs, 0);
  const hasContent = recipes.length > 0 || products.length > 0;

  return (
    <div className="bg-white dark:bg-dark-surface border border-ink-200 dark:border-dark-border rounded-md overflow-hidden">
      {/* Header */}
      <div className="flex items-center gap-3 px-4 py-3 hover:bg-brand-200/20 transition-colors cursor-pointer" onClick={onToggle}>
        <button className="w-6 h-6 rounded-md flex items-center justify-center text-ink-600 dark:text-dark-textMuted hover:bg-ink-200 dark:hover:bg-dark-elevated shrink-0">
          <Icon name={expanded ? 'chevD' : 'chevR'} className="w-4 h-4" stroke={2.5} />
        </button>
        <div className="text-[14px] font-semibold text-ink-900 dark:text-dark-text shrink-0">{meal.name}</div>
        <div className="text-[12px] text-ink-600 dark:text-dark-textMuted shrink-0">{meal.time}</div>
        <div className="flex-1"></div>
        {/* Running totals */}
        <div className="flex items-center gap-3 text-[11px] text-ink-700 dark:text-dark-textMuted shrink-0">
          <span className="flex items-center gap-1">
            <Icon name="flame" className="w-3 h-3 text-warning" stroke={2} />
            <span className="font-semibold text-ink-900 dark:text-dark-text">{totalKcal}</span>
            <span className="text-ink-600 dark:text-dark-textMuted">/ {meal.targetKcal} kcal</span>
          </span>
          <span className="flex items-center gap-1"><MacroRing letter="B" color="#E5A117" /> <span className="font-semibold text-ink-900 dark:text-dark-text">{totalProtein}</span><span className="text-ink-600 dark:text-dark-textMuted"> / {meal.targetProtein} g</span></span>
          <span className="flex items-center gap-1"><MacroRing letter="T" color="#D44450" /> <span className="font-semibold text-ink-900 dark:text-dark-text">{totalFat}</span><span className="text-ink-600 dark:text-dark-textMuted"> / {meal.targetFat} g</span></span>
          <span className="flex items-center gap-1"><MacroRing letter="W" color="#3AB795" /> <span className="font-semibold text-ink-900 dark:text-dark-text">{totalCarbs}</span><span className="text-ink-600 dark:text-dark-textMuted"> / {meal.targetCarbs} g</span></span>
        </div>
        {/* Action buttons */}
        <div className="flex items-center gap-1 shrink-0" onClick={e => e.stopPropagation()}>
          <button onClick={onAutogen} className="w-8 h-8 rounded-full bg-gradient-brand text-white flex items-center justify-center shadow-brand-sm btn-press" title="Autogeneruj przepisy">
            <Icon name="sparkles" className="w-3.5 h-3.5" />
          </button>
          <button onClick={onAddManual} className="w-8 h-8 rounded-full bg-white dark:bg-dark-surface border border-brand-300 dark:border-brand/30 text-brand hover:bg-brand-200 dark:bg-brand/20 flex items-center justify-center btn-press" title="Dodaj ręcznie">
            <Icon name="plus" className="w-3.5 h-3.5" stroke={2.5} />
          </button>
          <button className="w-8 h-8 rounded-full bg-white dark:bg-dark-surface border border-ink-200 dark:border-dark-border text-ink-600 dark:text-dark-textMuted hover:border-brand hover:text-brand flex items-center justify-center btn-press" title="Więcej">
            <Icon name="more" className="w-3.5 h-3.5" />
          </button>
        </div>
      </div>

      {/* Expanded body */}
      {expanded && hasContent && (
        <div className="border-t border-ink-200 dark:border-dark-border p-4 space-y-4 bg-ink-200/20 dark:bg-dark-elevated/20">
          {recipes.length > 0 && (
            <div>
              <div className="text-[10px] font-semibold text-ink-700 dark:text-dark-textMuted uppercase tracking-wider mb-2">Przepisy ({recipes.length})</div>
              <div className="space-y-2">
                {recipes.map(r => <RecipeCard key={r.id} recipe={r} onRemove={() => onRemoveRecipe(r.id)} />)}
              </div>
            </div>
          )}
          {products.length > 0 && (
            <div>
              <div className="text-[10px] font-semibold text-ink-700 dark:text-dark-textMuted uppercase tracking-wider mb-2">Produkty ({products.length})</div>
              <div className="space-y-2">
                {products.map(p => (
                  <div key={p.id} className="bg-white dark:bg-dark-surface border border-ink-200 dark:border-dark-border rounded-md hover:border-brand-300 dark:border-brand/30 hover:shadow-e1 transition-all group">
                    <div className="flex items-center gap-3 p-3">
                      <div className="w-14 h-14 rounded-md bg-gradient-to-br from-warning-light to-warning/20 shrink-0 flex items-center justify-center">
                        <Icon name="apple" className="w-6 h-6 text-warning-dark dark:text-warning-bright" stroke={1.5} />
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="text-[13px] font-semibold text-ink-900 dark:text-dark-text truncate mb-1">{p.name}</div>
                        <div className="flex items-center gap-3 text-[11px] text-ink-700 dark:text-dark-textMuted flex-wrap">
                          <span className="flex items-center gap-1">
                            <Icon name="flame" className="w-3 h-3 text-warning" /> <span className="font-semibold text-ink-900 dark:text-dark-text">{p.kcal} kcal</span>
                            <span className="text-ink-600 dark:text-dark-textMuted">(B: {p.protein} g — T: {p.fat} g — W: {p.carbs} g)</span>
                          </span>
                          <span className="flex items-center gap-1 text-ink-600 dark:text-dark-textMuted"><Icon name="folder" className="w-3 h-3" /> {p.category}</span>
                        </div>
                      </div>
                      <div className="flex items-center gap-1 shrink-0">
                        {p.status.allergen && <StatusBadge type="allergen" />}
                      </div>
                      <div className="flex items-center gap-1 shrink-0">
                        {p.tags.map((t, i) => <span key={i} className="text-[10px] font-semibold text-brand bg-brand-400 dark:bg-brand/15 px-1.5 py-0.5 rounded border border-brand-300 dark:border-brand/30">{t}</span>)}

    setOnboardingOpen(false);

      onShareInApp={() => {}}
      onShareEmail={() => {}}

const MaterialsScreen = ({ flow, state, setState, onFinish, onBack }) => {
  const { usePZ } = React.useContext(NamingContext);
  const [groupByDay, setGroupByDay] = useState(true);
  const [filter, setFilter] = useState('all'); // all | text | pdf | video
  const [searchQuery, setSearchQuery] = useState('');
  const [libraryOpen, setLibraryOpen] = useState(false);

  const materials = state.program.materials || [];

  // Stepper config per flow
  const stepperConfig = {
    assumptions: { labels: ['Wybór', 'Założenia', 'Materiały', 'Gotowe'], current: 3, total: 4 },
    mealplan:    { labels: ['Wybór', 'Założenia', 'Jadłospis', 'Materiały', 'Gotowe'], current: 4, total: 5 },
    expert:      { labels: ['Wybór', 'Założenia', 'Przepisy', 'Jadłospis', 'Materiały', 'Gotowe'], current: 5, total: 6 },
  };
  const stepCfg = stepperConfig[flow] || stepperConfig.expert;

  // Filter materials
  const filtered = materials.filter(m => {
    if (filter !== 'all' && m.type !== filter) return false;
    if (searchQuery && !m.title.toLowerCase().includes(searchQuery.toLowerCase())) return false;
    return true;
  });

  // Group by day
  const grouped = {};
  filtered.forEach(m => {
    if (!grouped[m.day]) grouped[m.day] = [];
    grouped[m.day].push(m);
  });
  const sortedDays = Object.keys(grouped).map(Number).sort((a, b) => a - b);

  // Counts per filter
  const counts = {
    all:   materials.length,
    text:  materials.filter(m => m.type === 'text').length,
    pdf:   materials.filter(m => m.type === 'pdf').length,
    video: materials.filter(m => m.type === 'video').length,
  };

  const typeConfig = {
    text:  { icon: 'fileText',  bg: 'bg-warning-light dark:bg-warning/10',  color: 'text-warning-dark dark:text-warning-bright' },
    pdf:   { icon: 'filePdf',   bg: 'bg-error-light dark:bg-error/10',    color: 'text-error-dark dark:text-error-bright' },
    video: { icon: 'fileVideo', bg: 'bg-info-light dark:bg-info/10',     color: 'text-info-dark dark:text-info-bright' },
  };

  const getDateLabel = (dayNum) => {
    // Mock — in real app would compute from program.start + day offset
    const startDate = new Date(2026, 1, 10); // 10.02.2026
    const d = new Date(startDate);
    d.setDate(d.getDate() + (dayNum - 1));
    const daysPl = ['Nd','Pn','Wt','Śr','Cz','Pt','Sb'];
    return `${daysPl[d.getDay()]}, ${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${d.getFullYear()}`;
  };

  const removeMaterial = (id) => {
    setState(s => ({ ...s, program: { ...s.program, materials: s.program.materials.filter(m => m.id !== id) } }));
  };

  return (
    <ProgramShell
      program={state.program}
      activeTab="materials"
      onBack={onBack}
      onTabChange={(tab) => {
        if (tab === 'assumptions' || tab === 'recipes' || tab === 'products' || tab === 'mealplan') onBack();

            <div className="flex items-start gap-2"><div className="w-4 h-4 rounded-full bg-white dark:bg-dark-surface text-brand flex items-center justify-center text-[9px] font-semibold shrink-0 mt-0.5">3</div> Monitoruj realizację w zakładce "Monitoring"</div>
          </div>
        </div>

        <div className="flex gap-2">
          <button onClick={onDashboard} className="flex-1 h-10 rounded-sm btn-primary text-white font-medium text-sm">
            Wróć do {usePZ ? 'profilu klienta' : 'listy współprac'}
          </button>
          <button className="h-10 px-4 rounded-sm border border-ink-200 dark:border-dark-border bg-white dark:bg-dark-surface hover:border-brand text-ink-800 dark:text-dark-text font-medium text-sm">
            Dodaj materiały
          </button>
        </div>
      </div>
    </div>
  );
};

const ProductsScreen = ({ flow, state, setState, onNext, onBack }) => {
  const [activeDayTypeId, setActiveDayTypeId] = useState('d1');
  const [filter, setFilter] = useState('all');
  const [groupByCategory, setGroupByCategory] = useState(true);
  const [searchQuery, setSearchQuery] = useState('');
  const [selectedIds, setSelectedIds] = useState(new Set());
  const [exchangeModalOpen, setExchangeModalOpen] = useState(false);
  const [expandedProductId, setExpandedProductId] = useState('pp1'); // first product expanded by default
  const [dayTypesManagerOpen, setDayTypesManagerOpen] = useState(false);

  const currentDayTypes = state.program.hasMultipleDayTypes ? state.program.dayTypesMulti : state.program.dayTypes;

  const allProducts = MOCK_PROGRAM_PRODUCTS;

  // Counts per filter
  const counts = {
    all:       allProducts.length,
    removed:   allProducts.filter(p => p.status === 'removed').length,
    exchanged: allProducts.filter(p => p.status === 'exchanged').length,
    allergen:  allProducts.filter(p => p.statusFlags.allergen).length,
    dislike:   allProducts.filter(p => p.statusFlags.dislike).length,
    like:      allProducts.filter(p => p.statusFlags.like).length,
  };

  const filtered = allProducts.filter(p => {
    if (filter === 'removed' && p.status !== 'removed') return false;
    if (filter === 'exchanged' && p.status !== 'exchanged') return false;
    if (filter === 'allergen' && !p.statusFlags.allergen) return false;
    if (filter === 'dislike' && !p.statusFlags.dislike) return false;
    if (filter === 'like' && !p.statusFlags.like) return false;
    if (searchQuery && !p.name.toLowerCase().includes(searchQuery.toLowerCase())) return false;
    return true;
  });

  // Group by category
  const groupedProducts = {};
  if (groupByCategory) {
    filtered.forEach(p => {
      if (!groupedProducts[p.category]) groupedProducts[p.category] = [];
      groupedProducts[p.category].push(p);
    });
  }

  const categoryIcons = {
    'Nabiał': 'folder',
    'Owoce': 'apple',
    'Warzywa': 'apple',
    'Mięso i ryby': 'utensils',
  };

  const toggleSelect = (id) => {
    setSelectedIds(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  };

  const statusBadge = (status) => {
    if (status === 'exchanged') return { label: 'Wymieniony', icon: 'swap', bg: 'bg-info-light dark:bg-info/10', color: 'text-info-dark dark:text-info-bright' };
    if (status === 'removed') return { label: 'Usunięty', icon: 'trash', bg: 'bg-error-light dark:bg-error/10', color: 'text-error-dark dark:text-error-bright' };
    return null;
  };

  return (
    <ProgramShell
      program={state.program}
      activeTab="products"
      onBack={onBack}
      onTabChange={(tab) => {
        if (tab === 'assumptions') onBack();
        if (tab === 'recipes') onBack();
        if (tab === 'mealplan') onNext();
      }}
      shareState={state.program.shared ? 'shared' : 'draft'}
      onShareInApp={() => setState(s => ({ ...s, program: { ...s.program, shared: true } }))}
      onShareEmail={() => {}}
      onUnshare={() => setState(s => ({ ...s, program: { ...s.program, shared: false } }))}
      primaryAction={{
        label: selectedIds.size > 0 ? `Wymień (${selectedIds.size})` : 'Wymień globalnie',
        icon: 'swap',
        onClick: () => setExchangeModalOpen(true),
        disabled: selectedIds.size === 0,
      }}>

      <div className="max-w-[1400px] mx-auto px-4 md:px-8 py-5 md:py-7">
        {/* Tab toolbar: Produkty actions */}
        <div className="flex items-center justify-between gap-3 mb-4 flex-wrap">
          <div className="text-[13px] text-ink-700 dark:text-dark-textMuted">
            {selectedIds.size > 0
              ? <>Zaznaczono <strong className="text-ink-900 dark:text-dark-text">{selectedIds.size}</strong> {selectedIds.size === 1 ? 'produkt' : 'produktów'}. Wymień je globalnie w całym jadłospisie.</>
              : <>Przeglądaj produkty z jadłospisu i zarządzaj wymianami globalnie.</>
            }
          </div>
          <TabActionsMenu
            label="Akcje produktów"
            items={[
              { heading: 'Produkty' },
              { icon: 'fileText', label: 'Eksportuj listę (CSV)', onClick: () => {} },
              { icon: 'plus', label: 'Importuj z pliku', onClick: () => {} },
              { separator: true },
              { icon: 'swap', label: 'Cofnij wszystkie wymiany', onClick: () => {} },
            ]} />
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-[280px_1fr] gap-4">
          {/* LEFT: Day types list */}
          <aside>
            <DayTypesList
              dayTypes={currentDayTypes}
              activeId={activeDayTypeId}
              onSelect={setActiveDayTypeId}
              onAddDayType={() => setDayTypesManagerOpen(true)}
              onManage={() => setDayTypesManagerOpen(true)} />
          </aside>

          {/* RIGHT: Products */}
          <div className="space-y-4 min-w-0">
            {/* Filter bar */}
            <div className="bg-white dark:bg-dark-surface border border-ink-200 dark:border-dark-border rounded-lg p-3 shadow-e1 flex items-center justify-between gap-4 flex-wrap">
              <div className="flex items-center gap-1.5 flex-wrap">
                {[
                  { key: 'all',       label: 'Wszystkie',  count: counts.all, primary: true },
                  { key: 'removed',   label: 'Usunięte',   count: counts.removed },
                  { key: 'exchanged', label: 'Wymienione', count: counts.exchanged },
                  { key: 'allergen',  label: 'Alergeny',   count: counts.allergen },
                  { key: 'dislike',   label: 'Nielubiane', count: counts.dislike },
                  { key: 'like',      label: 'Lubiane',    count: counts.like },
                ].map(f => {
                  const isActive = filter === f.key;
                  return (
                    <button key={f.key} onClick={() => setFilter(f.key)}
                      className={`chip-press inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium border transition-all ${
                        isActive
                          ? 'bg-brand-400 dark:bg-brand/15 border-brand-300 dark:border-brand/30 text-brand shadow-brand-sm'
                          : 'bg-white dark:bg-dark-surface border-ink-200 dark:border-dark-border text-ink-700 dark:text-dark-textMuted hover:border-brand hover:text-brand'
                      }`}>
                      {isActive && f.primary && <Icon name="check" className="w-3 h-3" stroke={3} />}
                      <span>{f.label}</span>
                      <span className={`text-[10px] font-semibold ${isActive ? 'text-brand' : 'text-ink-600 dark:text-dark-textMuted'}`}>({f.count})</span>
                    </button>
                  );
                })}
              </div>

              <label className="flex items-center gap-2 cursor-pointer shrink-0" onClick={() => setGroupByCategory(!groupByCategory)}>
                <div className={`relative w-9 h-5 rounded-full transition-colors ${groupByCategory ? 'bg-gradient-brand shadow-brand-sm' : 'bg-ink-300 dark:bg-dark-borderLight'}`}>
                  <div className={`absolute top-0.5 w-4 h-4 rounded-full bg-white shadow-e1 transition-transform ${groupByCategory ? 'translate-x-[18px]' : 'translate-x-0.5'}`}></div>
                </div>
                <span className="text-[12px] font-medium text-ink-900 dark:text-dark-text">Grupuj według kategorii</span>
              </label>
            </div>

            {/* Search */}
            <div className="relative max-w-md">
              <Icon name="search" className="w-4 h-4 text-ink-500 dark:text-dark-textDim absolute left-3 top-1/2 -translate-y-1/2" stroke={2} />
              <input type="text" value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                placeholder="Szukaj"
                className="w-full h-9 pl-9 pr-4 bg-white dark:bg-dark-elevated text-ink-900 dark:text-dark-text border border-ink-200 dark:border-dark-border rounded-md text-[13px] focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand transition-all" />
            </div>

            {/* Bulk actions bar — when selection exists */}
            {selectedIds.size > 0 && (
              <div className="bg-brand-400/40 dark:bg-brand/10 border border-brand-300 dark:border-brand/30 rounded-lg p-3 flex items-center gap-3 fade-in shadow-brand-sm">
                <div className="w-8 h-8 rounded-md bg-gradient-brand text-white flex items-center justify-center shadow-brand-sm">
                  <Icon name="check" className="w-4 h-4" stroke={2.5} />
                </div>
                <div className="flex-1 min-w-0">
                  <div className="text-[13px] font-semibold text-ink-900 dark:text-dark-text">Zaznaczono {selectedIds.size} {selectedIds.size === 1 ? 'produkt' : 'produktów'}</div>
                  <div className="text-[11px] text-ink-700 dark:text-dark-textMuted">Wymiana zastosuje się do wszystkich przepisów w programie</div>
                </div>
                <button onClick={() => setSelectedIds(new Set())} className="btn-press h-8 px-3 rounded-md bg-white dark:bg-dark-surface border border-ink-200 dark:border-dark-border hover:border-brand hover:text-brand text-ink-700 dark:text-dark-textMuted text-[12px] font-semibold">
                  Wyczyść
                </button>
                <button onClick={() => setExchangeModalOpen(true)} className="btn-press h-8 px-3 rounded-md btn-primary text-white text-[12px] font-semibold flex items-center gap-1.5">
                  <Icon name="swap" className="w-3.5 h-3.5" stroke={2.5} /> Wymień globalnie
                </button>
              </div>
            )}

            {/* Products list — grouped by category */}
            {groupByCategory ? (
              <div className="space-y-4">
                {Object.entries(groupedProducts).map(([cat, products]) => (
                  <div key={cat}>
                    <div className="flex items-center gap-2 mb-2">
                      <div className="w-5 h-5 rounded bg-brand-400 dark:bg-brand/15 text-brand flex items-center justify-center">
                        <Icon name={categoryIcons[cat] || 'folder'} className="w-3 h-3" stroke={2} />
                      </div>
                      <h3 className="text-[13px] font-semibold text-ink-900 dark:text-dark-text">{cat}</h3>
                      <span className="text-[11px] text-ink-600 dark:text-dark-textMuted">({products.length})</span>
                    </div>
                    <div className="bg-white dark:bg-dark-surface border border-ink-200 dark:border-dark-border rounded-lg overflow-hidden shadow-e1">
                      {/* Table header */}
                      <div className="grid grid-cols-[24px_1fr_160px_260px_100px] gap-3 px-4 py-2 text-[10px] font-semibold text-ink-700 dark:text-dark-textMuted uppercase tracking-wider border-b border-ink-200 dark:border-dark-border bg-ink-200/30 dark:bg-dark-elevated/30 min-w-[820px]">
                        <div></div>
                        <div>Nazwa</div>
                        <div>Status</div>
                        <div>Tagi</div>
                        <div className="text-right">Akcje</div>
                      </div>
                      {/* Rows */}
                      {products.map((p, pi) => {
                        const isSelected = selectedIds.has(p.id);
                        const badge = statusBadge(p.status);
                        const isExpanded = expandedProductId === p.id && p.usedIn.length > 0;
                        return (
                          <Fragment key={p.id}>
                            <div className={`grid grid-cols-[24px_1fr_160px_260px_100px] gap-3 items-center px-4 py-2.5 hover:bg-brand-200/30 dark:hover:bg-brand/5 transition-colors group min-w-[820px] ${pi > 0 ? 'border-t border-ink-200 dark:border-dark-border' : ''} ${isSelected ? 'bg-brand-400/30 dark:bg-brand/10' : ''}`}>
                              {/* Checkbox */}
                              <div onClick={() => toggleSelect(p.id)}
                                className={`w-4 h-4 rounded border-2 flex items-center justify-center shrink-0 cursor-pointer ${
                                  isSelected ? 'bg-brand border-brand' : 'bg-white dark:bg-dark-elevated border-ink-400 dark:border-dark-borderLight'
                                }`}>
                                {isSelected && <Icon name="check" className="w-2.5 h-2.5 text-white" stroke={3.5} />}
                              </div>
                              {/* Name with expand */}
                              <div className="flex items-center gap-2 min-w-0">
                                {p.usedIn.length > 0 && (
                                  <button onClick={() => setExpandedProductId(isExpanded ? null : p.id)}
                                    className="w-5 h-5 rounded-md flex items-center justify-center text-ink-600 dark:text-dark-textMuted hover:bg-ink-200 dark:hover:bg-dark-elevated shrink-0">
                                    <Icon name={isExpanded ? 'chevD' : 'chevR'} className="w-3.5 h-3.5" stroke={2.5} />
                                  </button>
                                )}
                                {p.usedIn.length === 0 && <div className="w-5" />}
                                <span className="text-[13px] font-medium text-ink-900 dark:text-dark-text truncate">{p.name}</span>
                                {p.statusFlags.allergen && (
                                  <span title="Alergen" className="w-4 h-4 rounded-full bg-error-light dark:bg-error/10 text-error-dark dark:text-error-bright flex items-center justify-center shrink-0">
                                    <Icon name="noEnter" className="w-2.5 h-2.5" stroke={2.5} />
                                  </span>
                                )}
                              </div>
                              {/* Status badge */}
                              <div>
                                {badge ? (
                                  <span className={`inline-flex items-center gap-1 text-[11px] font-medium ${badge.color}`}>
                                    <Icon name={badge.icon} className="w-3 h-3" stroke={2} /> {badge.label}
                                  </span>
                                ) : (
                                  <span className="text-[11px] text-ink-600 dark:text-dark-textMuted">—</span>
                                )}
                              </div>
                              {/* Tags */}
                              <div className="flex items-center gap-1 flex-wrap">
                                {p.statusFlags.dislike && (
                                  <span title="Klient nie lubi" className="w-5 h-5 rounded-full bg-warning-light dark:bg-warning/10 text-warning-dark dark:text-warning-bright flex items-center justify-center">
                                    <Icon name="dislike" className="w-3 h-3" stroke={2} />
                                  </span>
                                )}
                                {p.statusFlags.info && (
                                  <span title="Info" className="w-5 h-5 rounded-full bg-info-light dark:bg-info/10 text-info-dark dark:text-info-bright flex items-center justify-center">
                                    <Icon name="info" className="w-3 h-3" stroke={2} />
                                  </span>
                                )}
                                {p.tags.slice(0, 3).map((t, i) => (
                                  <span key={i} className="text-[10px] font-semibold text-brand bg-brand-400 dark:bg-brand/15 px-1.5 py-0.5 rounded border border-brand-300 dark:border-brand/30">{t}</span>
                                ))}
                              </div>
                              {/* Actions */}
                              <div className="flex items-center justify-end gap-0.5 opacity-60 group-hover:opacity-100 transition-opacity">
                                <button className="w-7 h-7 rounded-md hover:bg-ink-200 dark:hover:bg-dark-elevated flex items-center justify-center text-ink-600 dark:text-dark-textMuted btn-press" title="Wymień">
                                  <Icon name="swap" className="w-3.5 h-3.5" />
                                </button>
                                <button className="w-7 h-7 rounded-md hover:bg-error-light dark:hover:bg-error/10 hover:text-error-dark dark:hover:text-error flex items-center justify-center text-ink-600 dark:text-dark-textMuted btn-press" title="Usuń">
                                  <Icon name="trash" className="w-3.5 h-3.5" />
                                </button>
                              </div>
                            </div>
                            {/* Expanded "used in" section */}
                            {isExpanded && (

          activeDayTypes={currentDayTypes}

          onClose={() => setDayTypesManagerOpen(false)}

            const allTypes = [...currentDayTypes, ...(state.program.unusedDayTypes || [])];
            const newActive = allTypes.filter(dt => activeIds.has(dt.id));
            const newUnused = allTypes.filter(dt => !activeIds.has(dt.id));
            const shouldUseMulti = newActive.length > 1;
            setState(s => ({
              ...s,
              program: {
                ...s.program,
                hasMultipleDayTypes: shouldUseMulti || s.program.hasMultipleDayTypes,
                ...(shouldUseMulti
                  ? { dayTypesMulti: newActive }
                  : newActive.length === 1
                    ? { dayTypes: newActive }
                    : {}),
                unusedDayTypes: newUnused,

const App = () => {
  const [state, setState] = useState({
    screen: 'dashboard',
    flow: null,
    program: initialProgram,
  });
  const [usePZ, setUsePZ] = useState(true);
  const [theme, setTheme] = useState('light'); // 'light' | 'dark' | 'system'

  // Apply theme to <html> when it changes
  useEffect(() => {
    const applyTheme = () => {
      const root = document.documentElement;
      const isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      root.classList.toggle('dark', isDark);
    };
    applyTheme();
    if (theme === 'system') {
      const mq = window.matchMedia('(prefers-color-scheme: dark)');
      mq.addEventListener('change', applyTheme);
      return () => mq.removeEventListener('change', applyTheme);
    }
  }, [theme]);

  const goTo = (screen) => setState(s => ({ ...s, screen }));
  const pickFlow = (flow, template = null) => {
    if (flow === 'template' && template) {
      // Template picked → behave like expert flow but with prefilled data
      // Apply template's metadata to program name and move to setup
      setState(s => ({
        ...s,
        flow: 'expert', // template uses expert flow structure
        screen: 'setup',
        fromTemplate: template,
        program: {
          ...s.program,
          name: `${template.name} — Karolina Szafrańska`,
          templateRef: template.id,
        },
      }));
    } else {
      setState(s => ({ ...s, flow, screen: 'setup', fromTemplate: null }));
    }
  };
  const reset = () => setState(s => ({ ...s, screen: 'dashboard', flow: null, program: initialProgram }));

  // Build breadcrumb based on current screen + flow
  const breadcrumb = useMemo(() => {
    const screenLabel = {
      dashboard: null,
      intent: 'Nowa współpraca',
      setup: 'Założenia',
      recipes: 'Przepisy',
      products: 'Produkty',
      mealplan: 'Jadłospis',
      materials: 'Materiały',
      done: 'Gotowe',
    }[state.screen];

    if (state.screen === 'dashboard') return ['Klienci', 'Karolina Szafrańska'];
    if (state.screen === 'intent') return ['Klienci', 'Karolina Szafrańska', 'Nowa współpraca'];

    // Program-level screens: Klienci > Karolina Szafrańska > Wiosenna przemiana > [active tab]
    const parts = ['Klienci', 'Karolina Szafrańska', state.program.name];
    if (screenLabel && screenLabel !== 'Nowa współpraca') parts.push(screenLabel);
    return parts;
  }, [state.screen, state.flow, state.program.name]);

  const [mobileSidebarOpen, setMobileSidebarOpen] = useState(false);

  // Close mobile sidebar when navigating
  useEffect(() => {
    setMobileSidebarOpen(false);
  }, [state.screen]);

  return (
    <ThemeContext.Provider value={{ theme, setTheme }}>
    <NamingContext.Provider value={{ usePZ }}>
      <div className="h-screen flex bg-ink-200 dark:bg-dark-bg overflow-hidden">
        <Sidebar mobileOpen={mobileSidebarOpen} setMobileOpen={setMobileSidebarOpen} />
        <div className="flex-1 flex flex-col min-w-0">
          <Topbar breadcrumb={breadcrumb} onMenuClick={() => setMobileSidebarOpen(true)} />
          <div className="flex-1 overflow-hidden flex">
            {state.screen === 'dashboard' && <Dashboard onStart={() => goTo('intent')} />}
            {state.screen === 'intent' && <IntentScreen onPick={pickFlow} onBack={() => goTo('dashboard')} />}
            {state.screen === 'setup' && (
              <SetupScreen flow={state.flow} state={state} setState={setState}
                onNext={(target) => {
                  if (target === 'bags') return goTo('materials');
                  if (target === 'mealplan') return goTo('mealplan');
                  if (target === 'recipes') return goTo('recipes');
                  // default routing by flow — all flows now pass through materials before done
                  if (state.flow === 'assumptions') return goTo('materials');
                  if (state.flow === 'mealplan') return goTo('mealplan');
                  return goTo('recipes');
                }}
                onFinish={() => goTo('materials')}
                onBack={() => goTo('intent')} />
            )}
            {state.screen === 'recipes' && (
              <RecipesScreen flow={state.flow} state={state} setState={setState}
                onNext={() => goTo('mealplan')}
                onProducts={() => goTo('products')}
                onBack={() => goTo('setup')} />
            )}
            {state.screen === 'products' && (
              <ProductsScreen flow={state.flow} state={state} setState={setState}
                onNext={() => goTo('mealplan')}
                onBack={() => goTo('recipes')} />
            )}
            {state.screen === 'mealplan' && (
              <MealplanScreen flow={state.flow} state={state}
                onFinish={() => goTo('materials')}
                onBack={() => goTo('recipes')} />
            )}
            {state.screen === 'materials' && (
              <MaterialsScreen flow={state.flow} state={state} setState={setState}
                onFinish={() => goTo('done')}
                onBack={() => {
                  // Back goes to previous step in the flow
                  if (state.flow === 'assumptions') return goTo('setup');
                  if (state.flow === 'mealplan') return goTo('mealplan');
                  return goTo('mealplan'); // expert
                }} />
            )}
            {state.screen === 'done' && <DoneScreen flow={state.flow} state={state} onDashboard={reset} />}
          </div>
        </div>
      </div>
    </NamingContext.Provider>
    </ThemeContext.Provider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
